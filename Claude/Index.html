<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚禮賓客現場報到與座位查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        html { overflow-y: scroll; scrollbar-gutter: stable; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f5f0; }

        @keyframes table-pulse-glow {
            0%, 100% {
                background-color: #fee2e2;
                border-color: #f87171;
                box-shadow: 0 4px 6px -1px rgba(239,68,68,0.1), 0 2px 4px -1px rgba(239,68,68,0.06);
            }
            50% {
                background-color: #fca5a5;
                border-color: #ef4444;
                box-shadow: 0 0 15px 4px rgba(239,68,68,0.5);
            }
        }

        .table-active {
            animation: table-pulse-glow 1.2s infinite ease-in-out;
            z-index: 50;
        }

        #reader video { object-fit: cover !important; border-radius: 12px; }
    </style>
</head>
<body class="p-2 md:p-4">

<div class="w-full mx-auto px-1 md:px-4">

    <!-- Header -->
    <header class="text-center mb-5 relative">
        <div class="md:absolute md:top-2 md:right-4 flex justify-center mb-2 md:mb-0">
            <div id="sync-status-badge" class="flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium transition-all duration-300 bg-emerald-50 text-emerald-700 border border-emerald-200">
                <span class="w-2 h-2 rounded-full bg-emerald-500 block animate-pulse"></span>
                <span id="sync-status-text">雲端連線正常</span>
            </div>
        </div>
        <h1 class="text-3xl font-bold text-stone-800 mb-1">✨ Our Wedding Guest Check-In ✨</h1>
        <p class="text-stone-500 text-sm">婚禮現場賓客報到與座位查詢系統</p>
    </header>

    <!-- Dashboard -->
    <div class="bg-white rounded-2xl p-4 shadow-sm border border-stone-200 mb-5">
        <div class="grid grid-cols-3 gap-4 text-center mb-3">
            <div class="bg-stone-50 p-2.5 rounded-xl">
                <p class="text-xs text-stone-500">應到人數</p>
                <p id="total-count" class="text-2xl font-bold text-stone-700">0</p>
            </div>
            <div class="bg-emerald-50 p-2.5 rounded-xl">
                <p class="text-xs text-emerald-600">已到人數</p>
                <p id="checked-count" class="text-2xl font-bold text-emerald-600">0</p>
            </div>
            <div class="bg-amber-50 p-2.5 rounded-xl">
                <p class="text-xs text-amber-600">未到人數</p>
                <p id="unchecked-count" class="text-2xl font-bold text-amber-600">0</p>
            </div>
        </div>
        <div class="w-full bg-stone-100 rounded-full h-3.5 overflow-hidden">
            <div id="progress-bar" class="bg-gradient-to-r from-emerald-400 to-teal-500 h-3.5 rounded-full transition-all duration-500" style="width: 0%"></div>
        </div>
        <p id="progress-text" class="text-right text-[11px] text-stone-500 mt-1">目前報到率：0%</p>
    </div>

    <!-- Main Layout -->
    <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 w-full items-stretch">

        <!-- Left: Search + Guest List -->
        <div class="lg:col-span-5 bg-white rounded-2xl p-5 shadow-sm border border-stone-200 flex flex-col">
            <h2 class="text-lg font-semibold text-stone-700 mb-3">🔍 賓客搜尋簽到</h2>
            <div class="mb-4 flex items-center gap-2 w-full">
                <input type="text" id="search-input" placeholder="請輸入賓客姓名（如：王小明）..."
                       class="w-full min-w-0 flex-1 px-4 py-2.5 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-rose-300 text-lg">
                <button onclick="startScanner()"
                        class="bg-rose-500 hover:bg-rose-600 text-white px-4 rounded-xl flex items-center justify-center shadow-sm transition shrink-0 text-xl"
                        style="height: 46px;" title="開啟相機掃描">📷</button>
            </div>
            <div class="overflow-y-scroll h-[420px] pr-1 divide-y divide-stone-100" id="guest-list">
                <p class="text-center text-stone-400 py-8">正在連線至雲端試算表載入名單...</p>
            </div>
        </div>

        <!-- Right: Floor Plan -->
        <div class="lg:col-span-7 bg-white rounded-2xl p-5 shadow-sm border border-stone-200 flex flex-col">
            <h2 class="text-lg font-semibold text-stone-700 mb-4">📍 宴會廳座位圖</h2>
            <div class="w-full bg-stone-100 border border-stone-200 rounded-2xl shadow-inner p-4 flex gap-4 flex-1 items-stretch justify-center min-h-[500px]">
                <div class="w-12 bg-rose-100 border border-rose-200 text-rose-700 flex items-center justify-center rounded-xl font-bold text-sm text-center px-2 shadow-sm self-stretch" style="writing-mode: vertical-lr;">舞 台 (Stage)</div>
                <div class="flex-1 bg-white border border-stone-200 rounded-xl shadow-sm p-2 flex items-center justify-center overflow-hidden self-stretch w-full">
                    <div id="floor-plan" class="w-full aspect-[16/10] max-h-[420px] relative"></div>
                </div>
            </div>
        </div>

    </div>
</div>

<!-- ==================== MODALS ==================== -->

<!-- Success Modal -->
<div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50 transition-opacity duration-300">
    <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-xl transform scale-95 transition-transform duration-300">
        <div class="text-5xl mb-4">🎉</div>
        <h3 class="text-2xl font-bold text-stone-800 mb-2">歡迎光臨！</h3>
        <p id="modal-name" class="text-xl font-medium text-rose-600 mb-1">---</p>
        <div id="modal-table-container" class="text-stone-500 mb-6">
            您的座位在：<span id="modal-table" class="font-bold text-stone-800 bg-amber-100 px-2 py-1 rounded">---</span>
        </div>
        <button onclick="closeModal()" class="w-full bg-stone-800 text-white py-3 rounded-xl font-medium hover:bg-stone-700 transition">確認</button>
    </div>
</div>

<!-- Scanner Modal -->
<div id="scanner-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center p-4 z-50 transition-opacity duration-300">
    <div class="bg-white rounded-2xl p-5 max-w-md w-full text-center shadow-xl flex flex-col">
        <div class="flex justify-between items-center mb-3">
            <h3 class="text-lg font-bold text-stone-800">📷 掃描賓客 QR Code</h3>
            <button onclick="closeScanner()" class="text-stone-400 hover:text-stone-600 font-bold text-xl px-2">✕</button>
        </div>
        <div id="reader" class="w-full bg-stone-900 rounded-xl overflow-hidden shadow-inner" style="max-height: 350px;"></div>
        <p class="text-xs text-stone-400 mt-3">請將賓客的 QR Code 對準鏡頭中央即可自動報到</p>
    </div>
</div>

<!-- Group Check-In Modal -->
<div id="group-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50 transition-opacity duration-300">
    <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-xl transform scale-95 transition-transform duration-300 flex flex-col">
        <h3 class="text-xl font-bold text-stone-800 mb-1">👥 家族/群組聯合報到</h3>
        <p class="text-sm text-stone-500 mb-4">請勾選本次現場「實際到場」的成員：</p>
        <div id="group-member-list" class="space-y-2.5 max-h-[260px] overflow-y-auto mb-5 pr-1"></div>
        <div class="flex gap-3">
            <button onclick="closeGroupModal()" class="flex-1 bg-stone-100 text-stone-600 py-3 rounded-xl font-medium hover:bg-stone-200 transition">取消</button>
            <button onclick="submitGroupCheckIn()" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white py-3 rounded-xl font-medium shadow-sm transition">確認報到</button>
        </div>
    </div>
</div>

<!-- ==================== SCRIPT ==================== -->
<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzjNib56lrJMKki__XWhkOjiDOJn3a1sDkH8TveFQ8D4KSkjWJ394WnwwhDwsS2gkHd/exec";

    let guests = [];
    let tables = [];
    let html5QrCode = null;
    let currentGroupMembers = [];

    let syncQueue = JSON.parse(localStorage.getItem("wedding_sync_queue") || "[]");
    let isSyncing = false;

    initSystem();

    async function initSystem() {
        await fetchGuests();
        setInterval(processSyncQueue, 5000);
        updateSyncBadge();

        document.getElementById("search-input").addEventListener("input", (e) => {
            const keyword = e.target.value.trim();
            if (keyword === "") { renderList([]); return; }

            const matchedByName = guests.filter(g => g.name.includes(keyword));
            const associatedGroupIds = new Set();
            matchedByName.forEach(g => {
                const gid = String(g.groupId || "").trim();
                if (gid !== "") associatedGroupIds.add(gid);
            });

            const filtered = guests.filter(g => {
                const isNameMatch = g.name.includes(keyword);
                const gid = String(g.groupId || "").trim();
                const isGroupMatch = gid !== "" && associatedGroupIds.has(gid);
                return isNameMatch || isGroupMatch;
            });

            renderList(filtered);
        });
    }

    async function fetchGuests() {
        try {
            const res = await fetch(API_URL + "?_=" + Date.now());
            const data = await res.json();
            if (!data.success) {
                document.getElementById("guest-list").innerHTML = '<p class="text-center text-red-500 py-8">後台資料庫讀取失敗</p>';
                return;
            }
            guests = data.guests;
            tables = data.tables;
            renderDashboard();
            renderList([]);
            renderFloorPlan();
        } catch (err) {
            console.error(err);
            document.getElementById("guest-list").innerHTML = '<p class="text-center text-red-500 py-8">連線失敗，請確認後台 API 部署狀態。</p>';
        }
    }

    function renderFloorPlan() {
        const fp = document.getElementById("floor-plan");
        fp.innerHTML = "";
        fp.className = "w-full h-full grid grid-cols-5 grid-rows-4 gap-2 md:gap-4 p-2 relative";

        const ns = "http://www.w3.org/2000/svg";
        const svg = document.createElementNS(ns, "svg");
        svg.setAttribute("class", "absolute inset-0 z-0 pointer-events-none opacity-40 w-full h-full");
        svg.setAttribute("viewBox", "0 0 100 100");
        svg.setAttribute("preserveAspectRatio", "none");
        svg.style.overflow = "visible";
        const path = document.createElementNS(ns, "path");
        path.setAttribute("d", "M 20 50 L 80 50 L 80 100");
        path.setAttribute("fill", "none");
        path.setAttribute("stroke", "#fb923c");
        path.setAttribute("stroke-width", "8");
        path.setAttribute("stroke-linejoin", "round");
        path.setAttribute("stroke-linecap", "round");
        path.setAttribute("vector-effect", "non-scaling-stroke");
        svg.appendChild(path);
        fp.appendChild(svg);

        const gridPositions = {
            "主桌": "grid-row: 2 / span 2; grid-column: 1;",
            "1":   "grid-row: 1; grid-column: 2;",
            "6":   "grid-row: 2; grid-column: 2;",
            "10":  "grid-row: 3; grid-column: 2;",
            "2":   "grid-row: 1; grid-column: 3;",
            "7":   "grid-row: 2; grid-column: 3;",
            "11":  "grid-row: 3; grid-column: 3;",
            "15":  "grid-row: 4; grid-column: 3;",
            "3":   "grid-row: 1; grid-column: 4;",
            "8":   "grid-row: 2; grid-column: 4;",
            "12":  "grid-row: 3; grid-column: 4;",
            "16":  "grid-row: 4; grid-column: 4;",
            "5":   "grid-row: 1; grid-column: 5;",
            "9":   "grid-row: 2; grid-column: 5;",
            "13":  "grid-row: 3; grid-column: 5;",
            "17":  "grid-row: 4; grid-column: 5;"
        };
        const colors = [
            "text-rose-500 bg-rose-50 border-rose-200",
            "text-blue-500 bg-blue-50 border-blue-200",
            "text-purple-500 bg-purple-50 border-purple-200",
            "text-amber-500 bg-amber-50 border-amber-200",
            "text-emerald-500 bg-emerald-50 border-emerald-200"
        ];

        tables.forEach((t, idx) => {
            const cleanId = String(t.table_id).replace(".0", "").trim();
            const pos = gridPositions[cleanId];
            if (!pos) return;

            const div = document.createElement("div");
            div.id = "table-" + cleanId;
            const base = "aspect-square rounded-full flex flex-col items-center justify-center transition-all duration-300 p-1 text-center shadow-sm border bg-white self-center justify-self-center w-full max-w-[72px] md:max-w-[85px] z-20 ";

            if (cleanId === "主桌" || String(t.table_name).includes("主桌")) {
                div.className = base + "border-amber-400 ring-4 ring-amber-100 ring-offset-1 font-bold text-amber-800 text-xs md:text-sm scale-110";
                div.innerHTML = "<span>主桌</span>";
            } else {
                const color = colors[idx % colors.length];
                div.className = base + "border-stone-200 hover:border-stone-400";
                div.innerHTML = `<span class="text-[9px] md:text-[10px] font-bold ${color} border px-1.5 rounded-full mb-0.5">${cleanId}</span><span class="font-bold text-stone-700 text-[10px] md:text-[11px] truncate max-w-full px-0.5">${t.table_name}</span>`;
            }
            div.style.cssText = pos;
            fp.appendChild(div);
        });
    }

    function highlightTable(tableIds) {
        document.querySelectorAll("#floor-plan > div").forEach(el => el.classList.remove("table-active"));
        if (!tableIds) return;
        const ids = Array.isArray(tableIds) ? tableIds : [tableIds];
        ids.forEach(id => {
            const el = document.getElementById("table-" + String(id).replace(".0", "").trim());
            if (el) el.classList.add("table-active");
        });
    }

    function renderList(data) {
        const list = document.getElementById("guest-list");
        list.innerHTML = "";
        const keyword = document.getElementById("search-input").value.trim();

        if (data.length === 0) {
            if (keyword === "") {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center p-4">
                        <svg class="w-10 h-10 text-stone-300 mb-2.5" fill="none" stroke="currentColor" stroke-width="1.2" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z" />
                        </svg>
                        <p class="font-medium text-stone-600 text-sm tracking-wide">請輸入姓名或開啟相機掃碼</p>
                        <p class="text-[11px] text-stone-400 mt-1 tracking-wider">🔒 隱私安全模式已啟動</p>
                    </div>`;
            } else {
                list.innerHTML = `
                    <div class="flex flex-col items-center justify-center h-full text-center p-4">
                        <div class="text-2xl mb-1.5 text-stone-300">🔎</div>
                        <p class="font-medium text-stone-500 text-sm tracking-wide">找不到相符的賓客姓名</p>
                        <p class="text-xs text-stone-400 mt-1">請檢查錯字或輸入部分關鍵字</p>
                    </div>`;
            }
            return;
        }

        data.forEach(guest => {
            const item = document.createElement("div");
            item.className = "flex items-center justify-between py-3.5 transition-colors duration-200";
            const isChecked = guest.status === "已報到";

            const tObj = tables.find(t =>
                String(t.table_id).replace(".0","").trim().toLowerCase() ===
                String(guest.table).replace(".0","").trim().toLowerCase()
            );
            const cleanTId = String(guest.table).replace(".0","").trim();
            const isMain = cleanTId.includes("主桌") || cleanTId === "主桌";
            const tableNameText = tObj
                ? (isMain ? "主桌" : tObj.table_id + "桌(" + tObj.table_name + ")")
                : cleanTId + "桌";

            const btnHtml = isChecked
                ? `<div class="flex items-center gap-2">
                       <span class="text-sm text-emerald-600 font-medium bg-emerald-50 px-2.5 py-1.5 rounded-lg">✓ 已報到</span>
                       <button onclick="toggleCheckIn([${guest.id}], false)"
                               class="text-xs text-stone-400 bg-stone-100 hover:bg-stone-200 px-2 py-1.5 rounded-lg transition">取消</button>
                   </div>`
                : `<button onclick="handleCheckInInit(${guest.id})"
                           class="text-sm bg-rose-500 text-white px-4 py-1.5 rounded-lg hover:bg-rose-600 font-medium shadow-sm transition">確認報到</button>`;

            item.innerHTML = `
                <div>
                    <span class="text-lg font-medium text-stone-800">${guest.name}</span>
                    <span class="ml-3 text-xs bg-stone-100 text-stone-600 px-2.5 py-1 rounded-full font-medium">${tableNameText}</span>
                </div>
                <div>${btnHtml}</div>`;
            list.appendChild(item);
        });
    }

    async function startScanner() {
        document.getElementById("scanner-modal").classList.remove("hidden");
        document.getElementById("scanner-modal").classList.add("flex");
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start({ facingMode: "environment" }, { fps: 10, qrbox: { width: 220, height: 220 } }, onScanSuccess);
        } catch (err) {
            alert("無法開啟相機，請確認是否已給予本網站「相機存取權限」！");
            closeScanner();
        }
    }

    function onScanSuccess(decodedText) {
        const targetId = parseInt(decodedText.trim());
        if (isNaN(targetId)) return;
        const guest = guests.find(g => Number(g.id) === targetId);
        if (!guest) { alert("⚠️ 查無此賓客編號"); return; }
        closeScanner();
        handleCheckInInit(targetId);
    }

    async function closeScanner() {
        document.getElementById("scanner-modal").classList.add("hidden");
        document.getElementById("scanner-modal").classList.remove("flex");
        if (html5QrCode) {
            try { if (html5QrCode.isScanning) await html5QrCode.stop(); } catch (_) {}
            html5QrCode = null;
        }
    }

    function handleCheckInInit(id) {
        const guest = guests.find(g => Number(g.id) === Number(id));
        if (!guest) return;

        const gid = String(guest.groupId || "").trim();
        if (gid === "") { toggleCheckIn([guest.id], true); return; }

        const groupMembers = guests.filter(g => String(g.groupId || "").trim() === gid);
        if (groupMembers.length <= 1) {
            toggleCheckIn([guest.id], true);
        } else {
            openGroupModal(groupMembers, guest);
        }
    }

    function openGroupModal(members, triggerGuest) {
        currentGroupMembers = members;
        const container = document.getElementById("group-member-list");
        container.innerHTML = "";

        const uniqueTables = [...new Set(members.map(m => String(m.table).replace(".0","").trim()))];
        if (uniqueTables.length > 1) {
            const banner = document.createElement("div");
            banner.className = "bg-amber-50 border border-amber-200 text-amber-800 p-3 rounded-xl text-xs flex items-center gap-2 mb-3 font-medium animate-pulse text-left";
            banner.innerHTML = `
                <span class="text-base">⚠️</span>
                <div>
                    <p class="font-bold">注意：此家族成員分開入座不同桌次！</p>
                    <p class="text-[11px] text-amber-600 mt-0.5">帶位時請務必依據個人下方的專屬桌次進行引導。</p>
                </div>`;
            container.appendChild(banner);
        }
        const isSplitTable = uniqueTables.length > 1;

        members.forEach(m => {
            const div = document.createElement("div");
            const isCheckedIn = m.status === "已報到";
            const cleanTableStr = String(m.table).trim();
            const isMainTable = cleanTableStr.includes("主桌") || cleanTableStr === "主桌";
            const badgeStyle = isMainTable
                ? "bg-amber-100 text-amber-800 border-amber-300 font-bold px-2 py-0.5 rounded-md text-xs border"
                : (isSplitTable
                    ? "bg-stone-100 text-stone-700 border-stone-300 font-medium px-2 py-0.5 rounded-md text-xs border"
                    : "text-stone-400 text-xs");

            if (isCheckedIn) {
                div.className = "flex items-center justify-between bg-stone-50 p-3 rounded-xl border border-stone-200";
                div.innerHTML = `
                    <div class="flex items-center gap-3 flex-1 min-w-0">
                        <div class="w-5 h-5 flex items-center justify-center text-emerald-600 font-bold shrink-0">✓</div>
                        <div class="text-left flex-1 min-w-0">
                            <span class="font-medium text-stone-500 text-base block truncate">${m.name}</span>
                            <span class="${badgeStyle} inline-block mt-1">座位：${cleanTableStr}${isMainTable ? '' : '桌'} (已在場)</span>
                        </div>
                        <button onclick="toggleCheckIn([${m.id}], false); closeGroupModal();"
                                class="text-xs text-rose-500 bg-rose-50 hover:bg-rose-100 border border-rose-200 px-2.5 py-1.5 rounded-lg transition shrink-0 font-medium">
                            取消報到
                        </button>
                    </div>`;
            } else {
                const checkboxId = `chk-member-${m.id}`;
                const autoCheck = Number(m.id) === Number(triggerGuest.id);
                div.className = "flex items-center justify-between bg-white p-3 rounded-xl border border-stone-200 hover:border-rose-200 transition";
                div.innerHTML = `
                    <label for="${checkboxId}" class="flex items-center gap-3 cursor-pointer flex-1 py-1 w-full">
                        <input type="checkbox" id="${checkboxId}" value="${m.id}" ${autoCheck ? 'checked' : ''}
                               class="w-5 h-5 text-rose-500 border-stone-300 rounded focus:ring-rose-400 accent-rose-500 shrink-0">
                        <div class="text-left flex-1 min-w-0">
                            <span class="font-medium text-stone-800 text-base block truncate">${m.name}</span>
                            <span class="${badgeStyle} inline-block mt-1">座位：${cleanTableStr}${isMainTable ? '' : '桌'}</span>
                        </div>
                    </label>`;
            }
            container.appendChild(div);
        });

        const modal = document.getElementById("group-modal");
        modal.classList.remove("hidden");
        modal.classList.add("flex");
    }

    function closeGroupModal() {
        const modal = document.getElementById("group-modal");
        modal.classList.add("hidden");
        modal.classList.remove("flex");
    }

    function submitGroupCheckIn() {
        const checkboxes = document.getElementById("group-member-list").querySelectorAll('input[type="checkbox"]');
        const checkedIds = [];
        checkboxes.forEach(cb => { if (cb.checked) checkedIds.push(Number(cb.value)); });
        if (checkedIds.length === 0) { alert("⚠️ 請至少勾選一位實際到場的親友！"); return; }
        closeGroupModal();
        toggleCheckIn(checkedIds, true);
    }

    async function toggleCheckIn(ids, shouldCheckIn) {
        ids.forEach(id => {
            const g = guests.find(g => Number(g.id) === Number(id));
            if (g) g.status = shouldCheckIn ? "已報到" : "未報到";
        });

        renderDashboard();

        if (!shouldCheckIn) {
            renderList([]);
            highlightTable(null);
        } else {
            document.getElementById("search-input").value = "";
            const checkedGuests = guests.filter(g => ids.includes(Number(g.id)));
            const first = checkedGuests[0];

            if (first) {
                const targetTables = [...new Set(checkedGuests.map(g => String(g.table).replace(".0","").trim()))];
                const isSplit = targetTables.length > 1;

                let displayName = first.name;
                if (ids.length > 1) displayName += " 等 " + ids.length + " 人";
                document.getElementById("modal-name").innerText = displayName;

                const tableContainer = document.getElementById("modal-table-container");
                if (isSplit) {
                    let html = "<span class='text-stone-500 text-sm block mb-2 font-medium text-left'>家族分桌帶位明細：</span>";
                    html += "<div class='text-left p-3 bg-stone-50 rounded-xl border border-stone-100 space-y-2 max-h-[150px] overflow-y-auto'>";
                    checkedGuests.forEach(cg => {
                        const tObj = tables.find(t => String(t.table_id).replace(".0","").trim() === String(cg.table).replace(".0","").trim());
                        const cId = String(cg.table).replace(".0","").trim();
                        const isMain = cId.includes("主桌") || cId === "主桌";
                        const tText = tObj ? (isMain ? "主桌" : tObj.table_id + "桌(" + tObj.table_name + ")") : cId + "桌";
                        html += `<div class='flex justify-between items-center text-sm border-b border-stone-100 pb-1 last:border-0'>
                                    <span class='font-medium text-stone-700'>${cg.name}</span>
                                    <span class='font-bold ${isMain ? "text-amber-700 bg-amber-50 px-2 py-0.5 rounded border border-amber-200" : "text-stone-800 bg-stone-200/60 px-2 py-0.5 rounded"} text-xs'>${tText}</span>
                                 </div>`;
                    });
                    html += "</div>";
                    tableContainer.innerHTML = html;
                } else {
                    const tObj = tables.find(t => String(t.table_id).replace(".0","").trim() === String(first.table).replace(".0","").trim());
                    const cId = String(first.table).replace(".0","").trim();
                    const isMain = cId.includes("主桌") || cId === "主桌";
                    const tText = tObj ? (isMain ? "主桌" : tObj.table_id + "桌(" + tObj.table_name + ")") : cId + "桌";
                    tableContainer.innerHTML = `您的座位在：<span id="modal-table" class="font-bold text-stone-800 bg-amber-100 px-2 py-1 rounded">${tText}</span>`;
                }

                const modal = document.getElementById("success-modal");
                modal.classList.remove("hidden");
                modal.classList.add("flex");

                highlightTable(targetTables);
                renderList([]);
            }
        }

        syncQueue.push({ ids, action: shouldCheckIn ? "checkin" : "cancel" });
        localStorage.setItem("wedding_sync_queue", JSON.stringify(syncQueue));
        processSyncQueue();
    }

    async function processSyncQueue() {
        if (isSyncing || syncQueue.length === 0) { updateSyncBadge(); return; }
        isSyncing = true;
        updateSyncBadge();

        const task = syncQueue[0];
        try {
            const res = await fetch(API_URL, {
                method: "POST",
                body: JSON.stringify({ ids: task.ids, action: task.action })
            });
            const result = await res.json();
            if (result.success) {
                syncQueue.shift();
                localStorage.setItem("wedding_sync_queue", JSON.stringify(syncQueue));
            }
        } catch (_) {
        } finally {
            isSyncing = false;
            updateSyncBadge();
        }
    }

    function updateSyncBadge() {
        const badge = document.getElementById("sync-status-badge");
        const text = document.getElementById("sync-status-text");
        const dot = badge.querySelector("span");
        const pending = syncQueue.length;

        if (pending === 0) {
            badge.className = "flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium transition-all duration-300 bg-emerald-50 text-emerald-700 border border-emerald-200";
            text.innerText = "雲端連線正常";
            dot.className = "w-2 h-2 rounded-full bg-emerald-500 block animate-pulse";
        } else {
            badge.className = "flex items-center gap-1.5 px-3 py-1 rounded-full text-xs font-medium transition-all duration-300 bg-amber-50 text-amber-700 border border-amber-200";
            text.innerText = `🔄 Background Sync: ${pending} 筆待同步`;
            dot.className = "w-2 h-2 rounded-full bg-amber-500 block animate-spin";
        }
    }

    function renderDashboard() {
        const total = guests.length;
        const checked = guests.filter(g => g.status === "已報到").length;
        const pct = total > 0 ? Math.round((checked / total) * 100) : 0;
        document.getElementById("total-count").innerText = total;
        document.getElementById("checked-count").innerText = checked;
        document.getElementById("unchecked-count").innerText = total - checked;
        document.getElementById("progress-bar").style.width = pct + "%";
        document.getElementById("progress-text").innerText = "目前報到率：" + pct + "%";
    }

    function closeModal() {
        document.getElementById("success-modal").classList.add("hidden");
        document.getElementById("success-modal").classList.remove("flex");
    }

    document.addEventListener("click", (e) => {
        const insideModal =
            e.target.closest("#success-modal") ||
            e.target.closest("#scanner-modal") ||
            e.target.closest("#group-modal");
        if (!insideModal && e.target.tagName !== "BUTTON" && e.target.tagName !== "INPUT") {
            highlightTable(null);
        }
    });
</script>
</body>
</html>

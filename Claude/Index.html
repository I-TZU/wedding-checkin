<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
    <title>婚禮報到系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;500;700&family=Noto+Sans+TC:wght@300;400;500&display=swap');

        :root {
            --gold: #c9a84c;
            --gold-light: #e8c97a;
            --gold-dim: #7a6030;
            --bg: #0e0e0f;
            --surface: #181819;
            --surface2: #222224;
            --border: #2e2e31;
            --text: #e8e4dc;
            --text-dim: #888;
        }

        * { box-sizing: border-box; }
        html { overflow-y: scroll; scrollbar-gutter: stable; }
        body {
            font-family: 'Noto Sans TC', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            min-height: 100vh;
        }

        .serif { font-family: 'Noto Serif TC', serif; }

        .gold-line {
            height: 1px;
            background: linear-gradient(90deg, transparent, var(--gold), transparent);
        }

        .progress-track {
            background: var(--surface2);
            border-radius: 9999px;
            overflow: hidden;
            height: 6px;
        }
        .progress-fill {
            height: 100%;
            border-radius: 9999px;
            background: linear-gradient(90deg, var(--gold-dim), var(--gold), var(--gold-light));
            transition: width 0.6s cubic-bezier(0.4,0,0.2,1);
        }

        .card {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 16px;
        }

        .search-box {
            background: var(--surface2);
            border: 1px solid var(--border);
            border-radius: 12px;
            color: var(--text);
            outline: none;
            transition: border-color 0.2s;
            width: 100%;
        }
        .search-box:focus { border-color: var(--gold-dim); }
        .search-box::placeholder { color: var(--text-dim); }

        .guest-item {
            border-bottom: 1px solid var(--border);
            padding: 14px 0;
        }
        .guest-item:last-child { border-bottom: none; }

        .btn-checkin {
            background: linear-gradient(135deg, #8a6820, var(--gold));
            color: #0e0e0f;
            border-radius: 10px;
            font-weight: 600;
            font-size: 13px;
            padding: 8px 16px;
            border: none;
            cursor: pointer;
            white-space: nowrap;
            transition: opacity 0.15s;
        }
        .btn-checkin:active { opacity: 0.8; }

        .btn-cancel {
            background: var(--surface2);
            color: var(--text-dim);
            border: 1px solid var(--border);
            border-radius: 10px;
            font-size: 12px;
            padding: 6px 12px;
            cursor: pointer;
            transition: border-color 0.15s;
            white-space: nowrap;
        }

        .table-cell {
            aspect-ratio: 1;
            border-radius: 50%;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            border: 1px solid var(--border);
            background: var(--surface2);
            transition: border-color 0.2s, background 0.2s;
        }

        @keyframes seat-pulse {
            0%, 100% {
                background: #3d1a0a;
                border-color: var(--gold-dim);
                box-shadow: 0 0 0 2px rgba(201,168,76,0.15);
            }
            50% {
                background: #5c2a10;
                border-color: var(--gold);
                box-shadow: 0 0 14px 4px rgba(201,168,76,0.4);
            }
        }
        .table-active {
            animation: seat-pulse 1.2s infinite ease-in-out;
            z-index: 10;
        }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0,0,0,0.75);
            backdrop-filter: blur(4px);
            display: none;
            align-items: flex-end;
            justify-content: center;
            z-index: 50;
        }
        .modal-overlay.active { display: flex; }

        .bottom-sheet {
            background: var(--surface);
            border: 1px solid var(--border);
            border-bottom: none;
            border-radius: 20px 20px 0 0;
            width: 100%;
            max-width: 560px;
            max-height: 90vh;
            overflow-y: auto;
            padding: 28px 20px 40px;
            animation: slideUp 0.3s cubic-bezier(0.34,1.2,0.64,1);
        }
        @keyframes slideUp {
            from { transform: translateY(100%); opacity: 0; }
            to   { transform: translateY(0);    opacity: 1; }
        }

        .center-modal-wrap { align-items: center; }
        .center-modal {
            background: var(--surface);
            border: 1px solid var(--border);
            border-radius: 20px;
            width: calc(100% - 32px);
            max-width: 420px;
            padding: 20px;
            animation: popIn 0.25s cubic-bezier(0.34,1.2,0.64,1);
        }
        @keyframes popIn {
            from { transform: scale(0.9); opacity: 0; }
            to   { transform: scale(1);   opacity: 1; }
        }

        input[type="checkbox"] {
            accent-color: var(--gold);
            width: 18px;
            height: 18px;
            cursor: pointer;
            flex-shrink: 0;
        }

        #sync-badge {
            display: inline-flex;
            align-items: center;
            gap: 6px;
            font-size: 11px;
            padding: 4px 10px;
            border-radius: 9999px;
            border: 1px solid;
            transition: all 0.3s;
        }

        #reader video { object-fit: cover !important; border-radius: 10px; }

        .ornament {
            display: flex;
            align-items: center;
            gap: 10px;
            color: var(--gold-dim);
            font-size: 12px;
            letter-spacing: 0.15em;
        }
        .ornament::before, .ornament::after {
            content: '';
            flex: 1;
            height: 1px;
        }
        .ornament::before { background: linear-gradient(90deg, transparent, var(--gold-dim)); }
        .ornament::after  { background: linear-gradient(90deg, var(--gold-dim), transparent); }

        @keyframes pulse {
            0%,100% { opacity:1; } 50% { opacity:0.4; }
        }
        @keyframes spin {
            from { transform: rotate(0deg); } to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

<div class="max-w-2xl mx-auto px-4 py-6">

    <!-- Header -->
    <header class="text-center mb-6">
        <div class="flex justify-end mb-3">
            <div id="sync-badge" style="color:#4ade80;border-color:#166534;background:#052e16;">
                <span id="sync-dot" style="width:7px;height:7px;border-radius:50%;background:#4ade80;display:block;animation:pulse 2s infinite;flex-shrink:0;"></span>
                <span id="sync-text">雲端連線正常</span>
            </div>
        </div>
        <p style="font-size:11px;letter-spacing:0.3em;color:rgba(201,168,76,0.5);margin-bottom:8px;text-transform:uppercase;">Wedding Check-In</p>
        <h1 class="serif" style="font-size:28px;font-weight:300;color:var(--gold-light);letter-spacing:0.15em;margin-bottom:12px;">迎 賓 報 到</h1>
        <div class="gold-line mb-3"></div>
        <p style="font-size:12px;color:var(--text-dim);">輸入姓名或掃描 QR Code 完成報到</p>
    </header>

    <!-- Stats -->
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:12px;margin-bottom:20px;">
        <div class="card" style="text-align:center;padding:16px 8px;">
            <p style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">應到</p>
            <p id="total-count" class="serif" style="font-size:26px;font-weight:300;">0</p>
        </div>
        <div class="card" style="text-align:center;padding:16px 8px;border-color:var(--gold-dim);">
            <p style="font-size:11px;color:var(--gold-dim);margin-bottom:4px;">已到</p>
            <p id="checked-count" class="serif" style="font-size:26px;font-weight:300;color:var(--gold);">0</p>
        </div>
        <div class="card" style="text-align:center;padding:16px 8px;">
            <p style="font-size:11px;color:var(--text-dim);margin-bottom:4px;">未到</p>
            <p id="unchecked-count" class="serif" style="font-size:26px;font-weight:300;color:var(--text-dim);">0</p>
        </div>
    </div>

    <!-- Progress -->
    <div style="margin-bottom:24px;">
        <div class="progress-track">
            <div id="progress-bar" class="progress-fill" style="width:0%"></div>
        </div>
        <p id="progress-text" style="text-align:right;font-size:11px;color:var(--text-dim);margin-top:6px;">報到率 0%</p>
    </div>

    <!-- Search -->
    <div style="display:flex;gap:8px;margin-bottom:16px;">
        <input id="search-input" type="text" placeholder="輸入賓客姓名搜尋…"
               class="search-box" style="padding:14px 16px;font-size:16px;flex:1;">
        <button onclick="startScanner()"
                style="background:var(--surface2);border:1px solid var(--border);border-radius:12px;width:52px;height:52px;display:flex;align-items:center;justify-content:center;font-size:22px;cursor:pointer;flex-shrink:0;">
            📷
        </button>
    </div>

    <!-- Guest List -->
    <div class="card" style="margin-bottom:28px;min-height:180px;">
        <div id="guest-list" style="padding:0 16px;">
            <div style="display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 16px;text-align:center;">
                <p style="color:var(--text-dim);font-size:13px;">正在連線載入賓客名單…</p>
            </div>
        </div>
    </div>

    <!-- Floor Plan -->
    <div class="ornament" style="margin-bottom:16px;">座 位 圖</div>
    <div class="card" style="padding:16px;">
        <div style="display:flex;gap:12px;align-items:stretch;min-height:300px;">
            <div style="width:32px;background:rgba(201,168,76,0.06);border:1px solid var(--gold-dim);border-radius:8px;display:flex;align-items:center;justify-content:center;flex-shrink:0;">
                <span style="writing-mode:vertical-lr;font-size:10px;letter-spacing:0.2em;color:var(--gold-dim);">舞 台</span>
            </div>
            <div id="floor-plan" style="flex:1;display:grid;grid-template-columns:repeat(5,1fr);grid-template-rows:repeat(4,1fr);gap:6px;"></div>
        </div>
    </div>

</div>

<!-- ===== MODALS ===== -->

<!-- Success Modal -->
<div id="success-modal" class="modal-overlay">
    <div class="bottom-sheet">
        <div style="text-align:center;margin-bottom:16px;">
            <div style="font-size:40px;margin-bottom:8px;">🎊</div>
            <h2 class="serif" style="font-size:20px;font-weight:400;color:var(--gold-light);margin-bottom:6px;">歡迎光臨！</h2>
            <p id="modal-name" style="font-size:18px;color:var(--text);">---</p>
        </div>
        <div class="gold-line" style="margin-bottom:16px;"></div>
        <div id="modal-table-container" style="text-align:center;margin-bottom:24px;font-size:14px;color:var(--text-dim);">
            座位：<span id="modal-table" style="color:var(--gold);font-weight:600;">---</span>
        </div>
        <button onclick="closeModal()" class="btn-checkin" style="width:100%;padding:14px;font-size:15px;">確 認</button>
    </div>
</div>

<!-- Scanner Modal -->
<div id="scanner-modal" class="modal-overlay center-modal-wrap">
    <div class="center-modal">
        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;">
            <h3 style="font-size:15px;color:var(--text);">掃描賓客 QR Code</h3>
            <button onclick="closeScanner()" style="color:var(--text-dim);font-size:20px;background:none;border:none;cursor:pointer;padding:4px 8px;">✕</button>
        </div>
        <div id="reader" style="width:100%;background:#000;border-radius:10px;overflow:hidden;max-height:320px;"></div>
        <p style="color:var(--text-dim);font-size:11px;text-align:center;margin-top:10px;">對準 QR Code 即可自動識別</p>
    </div>
</div>

<!-- Group Modal -->
<div id="group-modal" class="modal-overlay">
    <div class="bottom-sheet">
        <h3 class="serif" style="font-size:18px;color:var(--gold-light);margin-bottom:4px;">家族聯合報到</h3>
        <p style="color:var(--text-dim);font-size:13px;margin-bottom:16px;">請勾選本次實際到場的成員</p>
        <div id="group-member-list" style="max-height:50vh;overflow-y:auto;margin-bottom:20px;"></div>
        <div style="display:flex;gap:12px;">
            <button onclick="closeGroupModal()" class="btn-cancel" style="flex:1;padding:13px;">取消</button>
            <button onclick="submitGroupCheckIn()" class="btn-checkin" style="flex:1;padding:13px;font-size:14px;">確認報到</button>
        </div>
    </div>
</div>

<script>
    const API_URL = "https://script.google.com/macros/s/AKfycbzjNib56lrJMKki__XWhkOjiDOJn3a1sDkH8TveFQ8D4KSkjWJ394WnwwhDwsS2gkHd/exec";

    let guests = [], tables = [], html5QrCode = null, currentGroupMembers = [];
    let syncQueue = JSON.parse(localStorage.getItem("wedding_sync_queue") || "[]");
    let isSyncing = false;

    initSystem();

    async function initSystem() {
        await fetchGuests();
        setInterval(processSyncQueue, 5000);
        updateSyncBadge();

        document.getElementById("search-input").addEventListener("input", e => {
            const kw = e.target.value.trim();
            if (!kw) { renderList([]); return; }
            const matched = guests.filter(g => g.name.includes(kw));
            const gids = new Set(matched.map(g => String(g.groupId||"").trim()).filter(Boolean));
            const filtered = guests.filter(g => {
                const gid = String(g.groupId||"").trim();
                return g.name.includes(kw) || (gid && gids.has(gid));
            });
            renderList(filtered);
        });
    }

    async function fetchGuests() {
        try {
            const res = await fetch(API_URL + "?_=" + Date.now());
            const data = await res.json();
            if (!data.success) { showListMsg("後台資料讀取失敗", true); return; }
            guests = data.guests;
            tables = data.tables;
            renderDashboard();
            renderList([]);
            renderFloorPlan();
        } catch(e) {
            showListMsg("連線失敗，請確認網路狀態", true);
        }
    }

    function showListMsg(msg, isErr) {
        document.getElementById("guest-list").innerHTML = `
            <div style="text-align:center;padding:40px 16px;">
                <p style="color:${isErr?'#e74c3c':'var(--text-dim)'};font-size:13px;">${msg}</p>
            </div>`;
    }

    function renderFloorPlan() {
        const fp = document.getElementById("floor-plan");
        fp.innerHTML = "";
        const gridPos = {
            "主桌":"grid-row:2/span 2;grid-column:1",
            "1":"grid-row:1;grid-column:2","6":"grid-row:2;grid-column:2","10":"grid-row:3;grid-column:2",
            "2":"grid-row:1;grid-column:3","7":"grid-row:2;grid-column:3","11":"grid-row:3;grid-column:3","15":"grid-row:4;grid-column:3",
            "3":"grid-row:1;grid-column:4","8":"grid-row:2;grid-column:4","12":"grid-row:3;grid-column:4","16":"grid-row:4;grid-column:4",
            "5":"grid-row:1;grid-column:5","9":"grid-row:2;grid-column:5","13":"grid-row:3;grid-column:5","17":"grid-row:4;grid-column:5"
        };
        tables.forEach(t => {
            const cid = String(t.table_id).replace(".0","").trim();
            const pos = gridPos[cid];
            if (!pos) return;
            const div = document.createElement("div");
            div.id = "table-" + cid;
            div.className = "table-cell";
            div.style.cssText = pos + ";";
            const isMain = cid === "主桌" || String(t.table_name).includes("主桌");
            if (isMain) {
                div.style.borderColor = "var(--gold-dim)";
                div.style.background = "rgba(201,168,76,0.08)";
                div.innerHTML = `<span style="color:var(--gold);font-size:10px;font-weight:600;letter-spacing:0.1em;">主桌</span>`;
            } else {
                div.innerHTML = `
                    <span style="color:var(--gold);font-size:11px;font-weight:700;line-height:1;">${cid}</span>
                    <span style="color:var(--text-dim);font-size:9px;margin-top:2px;max-width:90%;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;">${t.table_name}</span>`;
            }
            fp.appendChild(div);
        });
    }

    function highlightTable(ids) {
        document.querySelectorAll(".table-cell").forEach(el => el.classList.remove("table-active"));
        if (!ids) return;
        (Array.isArray(ids) ? ids : [ids]).forEach(id => {
            const el = document.getElementById("table-" + String(id).replace(".0","").trim());
            if (el) el.classList.add("table-active");
        });
    }

    function renderList(data) {
        const list = document.getElementById("guest-list");
        list.innerHTML = "";
        const kw = document.getElementById("search-input").value.trim();
        if (!data.length) {
            if (!kw) {
                list.innerHTML = `
                    <div style="display:flex;flex-direction:column;align-items:center;padding:48px 16px;text-align:center;">
                        <svg width="34" height="34" viewBox="0 0 24 24" fill="none" stroke="var(--gold-dim)" stroke-width="1.2" style="margin-bottom:12px;">
                            <path stroke-linecap="round" stroke-linejoin="round" d="M9 12.75L11.25 15 15 9.75m-3-7.036A11.959 11.959 0 013.598 6 11.99 11.99 0 003 9.749c0 5.592 3.824 10.29 9 11.623 5.176-1.332 9-6.03 9-11.622 0-1.31-.21-2.571-.598-3.751h-.152c-3.196 0-6.1-1.248-8.25-3.285z"/>
                        </svg>
                        <p style="color:var(--text-dim);font-size:13px;">隱私保護中</p>
                        <p style="color:var(--text-dim);font-size:11px;margin-top:4px;opacity:0.5;">輸入姓名或掃碼解鎖</p>
                    </div>`;
            } else {
                list.innerHTML = `<div style="text-align:center;padding:40px 16px;"><p style="color:var(--text-dim);font-size:13px;">找不到「${kw}」</p></div>`;
            }
            return;
        }
        data.forEach(g => {
            const isChecked = g.status === "已報到";
            const tObj = tables.find(t => String(t.table_id).replace(".0","").trim().toLowerCase() === String(g.table).replace(".0","").trim().toLowerCase());
            const cid = String(g.table).replace(".0","").trim();
            const isMain = cid.includes("主桌") || cid === "主桌";
            const tName = tObj ? (isMain ? "主桌" : cid + "桌・" + tObj.table_name) : cid + "桌";
            const div = document.createElement("div");
            div.className = "guest-item";
            div.innerHTML = `
                <div style="display:flex;align-items:center;justify-content:space-between;gap:12px;">
                    <div style="min-width:0;flex:1;">
                        <span style="font-size:16px;color:var(--text);display:block;margin-bottom:3px;">${g.name}</span>
                        <span style="font-size:11px;color:var(--gold-dim);">${tName}</span>
                    </div>
                    <div style="flex-shrink:0;">
                        ${isChecked
                            ? `<div style="display:flex;align-items:center;gap:8px;">
                                   <span style="font-size:12px;color:#4ade80;background:rgba(74,222,128,0.1);border:1px solid rgba(74,222,128,0.25);padding:5px 10px;border-radius:8px;">✓ 已到</span>
                                   <button onclick="toggleCheckIn([${g.id}],false)" class="btn-cancel">取消</button>
                               </div>`
                            : `<button onclick="handleCheckInInit(${g.id})" class="btn-checkin">確認報到</button>`
                        }
                    </div>
                </div>`;
            list.appendChild(div);
        });
    }

    async function startScanner() {
        document.getElementById("scanner-modal").classList.add("active");
        html5QrCode = new Html5Qrcode("reader");
        try {
            await html5QrCode.start({facingMode:"environment"},{fps:10,qrbox:{width:220,height:220}},onScanSuccess);
        } catch {
            alert("無法開啟相機，請確認已授予相機權限。");
            closeScanner();
        }
    }
    function onScanSuccess(text) {
        const id = parseInt(text.trim());
        if (isNaN(id)) return;
        const g = guests.find(g => Number(g.id) === id);
        if (!g) { alert("⚠️ 查無此賓客 QR Code"); return; }
        closeScanner();
        handleCheckInInit(id);
    }
    async function closeScanner() {
        document.getElementById("scanner-modal").classList.remove("active");
        if (html5QrCode) {
            try { if (html5QrCode.isScanning) await html5QrCode.stop(); } catch(_) {}
            html5QrCode = null;
        }
    }

    function handleCheckInInit(id) {
        const g = guests.find(g => Number(g.id) === Number(id));
        if (!g) return;
        const gid = String(g.groupId||"").trim();
        if (!gid) { toggleCheckIn([g.id], true); return; }
        const members = guests.filter(g => String(g.groupId||"").trim() === gid);
        members.length <= 1 ? toggleCheckIn([g.id], true) : openGroupModal(members, g);
    }

    function openGroupModal(members, trigger) {
        currentGroupMembers = members;
        const c = document.getElementById("group-member-list");
        c.innerHTML = "";
        const tset = [...new Set(members.map(m => String(m.table).replace(".0","").trim()))];
        if (tset.length > 1) {
            const b = document.createElement("div");
            b.style.cssText = "background:rgba(201,168,76,0.08);border:1px solid var(--gold-dim);border-radius:10px;padding:10px 14px;font-size:12px;color:var(--gold-dim);margin-bottom:12px;";
            b.innerHTML = `<strong style="color:var(--gold);">⚠ 注意</strong>：此家族成員分配於不同桌次，請依個別桌次引導。`;
            c.appendChild(b);
        }
        const isSplit = tset.length > 1;
        members.forEach(m => {
            const div = document.createElement("div");
            div.style.cssText = "display:flex;align-items:center;justify-content:space-between;padding:12px 0;border-bottom:1px solid var(--border);gap:12px;";
            const cid = String(m.table).trim();
            const isMain = cid.includes("主桌") || cid === "主桌";
            const tLabel = cid + (isMain ? "" : "桌");
            if (m.status === "已報到") {
                div.innerHTML = `
                    <div style="display:flex;align-items:center;gap:10px;flex:1;min-width:0;">
                        <span style="color:#4ade80;font-size:16px;flex-shrink:0;">✓</span>
                        <div>
                            <div style="color:var(--text-dim);font-size:15px;">${m.name}</div>
                            <div style="color:var(--gold-dim);font-size:11px;">${tLabel}（已在場）</div>
                        </div>
                    </div>
                    <button onclick="toggleCheckIn([${m.id}],false);closeGroupModal();"
                            style="font-size:11px;color:#e74c3c;background:rgba(231,76,60,0.1);border:1px solid rgba(231,76,60,0.3);padding:6px 10px;border-radius:8px;cursor:pointer;flex-shrink:0;white-space:nowrap;">
                        取消報到
                    </button>`;
            } else {
                const chkId = `chk-${m.id}`;
                const auto = Number(m.id) === Number(trigger.id);
                div.innerHTML = `
                    <label for="${chkId}" style="display:flex;align-items:center;gap:12px;flex:1;cursor:pointer;">
                        <input type="checkbox" id="${chkId}" value="${m.id}" ${auto?'checked':''}>
                        <div>
                            <div style="color:var(--text);font-size:15px;">${m.name}</div>
                            <div style="color:${isSplit?'var(--gold-dim)':'var(--text-dim)'};font-size:11px;">${tLabel}</div>
                        </div>
                    </label>`;
            }
            c.appendChild(div);
        });
        document.getElementById("group-modal").classList.add("active");
    }

    function closeGroupModal() { document.getElementById("group-modal").classList.remove("active"); }

    function submitGroupCheckIn() {
        const ids = [...document.getElementById("group-member-list").querySelectorAll('input[type="checkbox"]')]
            .filter(cb => cb.checked).map(cb => Number(cb.value));
        if (!ids.length) { alert("請至少勾選一位到場成員"); return; }
        closeGroupModal();
        toggleCheckIn(ids, true);
    }

    async function toggleCheckIn(ids, on) {
        ids.forEach(id => {
            const g = guests.find(g => Number(g.id) === Number(id));
            if (g) g.status = on ? "已報到" : "未報到";
        });
        renderDashboard();

        if (!on) {
            renderList([]);
            highlightTable(null);
        } else {
            document.getElementById("search-input").value = "";
            const checked = guests.filter(g => ids.includes(Number(g.id)));
            const first = checked[0];
            if (first) {
                const tids = [...new Set(checked.map(g => String(g.table).replace(".0","").trim()))];
                document.getElementById("modal-name").innerText = first.name + (ids.length > 1 ? ` 等 ${ids.length} 人` : "");
                const tc = document.getElementById("modal-table-container");
                if (tids.length > 1) {
                    let html = `<div style="text-align:left;">
                        <p style="font-size:12px;color:var(--text-dim);margin-bottom:8px;">家族分桌帶位明細</p>
                        <div style="border:1px solid var(--border);border-radius:10px;overflow:hidden;">`;
                    checked.forEach((cg, i) => {
                        const tObj = tables.find(t => String(t.table_id).replace(".0","").trim() === String(cg.table).replace(".0","").trim());
                        const cid = String(cg.table).replace(".0","").trim();
                        const isMain = cid.includes("主桌")||cid==="主桌";
                        const tText = tObj ? (isMain ? "主桌" : cid+"桌・"+tObj.table_name) : cid+"桌";
                        html += `<div style="display:flex;justify-content:space-between;align-items:center;padding:10px 14px;${i>0?'border-top:1px solid var(--border)':''}">
                            <span style="color:var(--text);font-size:14px;">${cg.name}</span>
                            <span style="color:var(--gold);font-size:13px;font-weight:600;">${tText}</span>
                        </div>`;
                    });
                    html += `</div></div>`;
                    tc.innerHTML = html;
                } else {
                    const tObj = tables.find(t => String(t.table_id).replace(".0","").trim() === String(first.table).replace(".0","").trim());
                    const cid = String(first.table).replace(".0","").trim();
                    const isMain = cid.includes("主桌")||cid==="主桌";
                    const tText = tObj ? (isMain ? "主桌" : cid+"桌・"+tObj.table_name) : cid+"桌";
                    tc.innerHTML = `座位：<span style="color:var(--gold);font-weight:600;">${tText}</span>`;
                }
                document.getElementById("success-modal").classList.add("active");
                highlightTable(tids);
                renderList([]);
            }
        }
        syncQueue.push({ids, action: on ? "checkin" : "cancel"});
        localStorage.setItem("wedding_sync_queue", JSON.stringify(syncQueue));
        processSyncQueue();
    }

    async function processSyncQueue() {
        if (isSyncing || !syncQueue.length) { updateSyncBadge(); return; }
        isSyncing = true;
        updateSyncBadge();
        const task = syncQueue[0];
        try {
            const res = await fetch(API_URL, {method:"POST", body:JSON.stringify({ids:task.ids, action:task.action})});
            if ((await res.json()).success) {
                syncQueue.shift();
                localStorage.setItem("wedding_sync_queue", JSON.stringify(syncQueue));
            }
        } catch(_) {}
        finally { isSyncing = false; updateSyncBadge(); }
    }

    function updateSyncBadge() {
        const badge = document.getElementById("sync-badge");
        const text = document.getElementById("sync-text");
        const dot = document.getElementById("sync-dot");
        const n = syncQueue.length;
        if (n === 0) {
            badge.style.cssText = "display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:9999px;border:1px solid;color:#4ade80;border-color:#166534;background:#052e16;transition:all 0.3s;";
            text.innerText = "雲端連線正常";
            dot.style.cssText = "width:7px;height:7px;border-radius:50%;background:#4ade80;display:block;animation:pulse 2s infinite;flex-shrink:0;";
        } else {
            badge.style.cssText = "display:inline-flex;align-items:center;gap:6px;font-size:11px;padding:4px 10px;border-radius:9999px;border:1px solid;color:var(--gold);border-color:var(--gold-dim);background:rgba(201,168,76,0.08);transition:all 0.3s;";
            text.innerText = `同步中 ${n} 筆`;
            dot.style.cssText = "width:7px;height:7px;border-radius:50%;background:var(--gold);display:block;animation:spin 1s linear infinite;flex-shrink:0;";
        }
    }

    function renderDashboard() {
        const total = guests.length;
        const checked = guests.filter(g => g.status === "已報到").length;
        const pct = total > 0 ? Math.round(checked/total*100) : 0;
        document.getElementById("total-count").innerText = total;
        document.getElementById("checked-count").innerText = checked;
        document.getElementById("unchecked-count").innerText = total - checked;
        document.getElementById("progress-bar").style.width = pct + "%";
        document.getElementById("progress-text").innerText = "報到率 " + pct + "%";
    }

    function closeModal() { document.getElementById("success-modal").classList.remove("active"); }

    document.addEventListener("click", e => {
        if (!e.target.closest(".bottom-sheet") && !e.target.closest(".center-modal") &&
            !e.target.closest("button") && !e.target.closest("input")) {
            highlightTable(null);
        }
    });
</script>
</body>
</html>

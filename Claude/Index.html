<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>婚禮報到系統</title>
<script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@400;600;700&family=Noto+Sans+TC:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root {
  --ivory:   #fdf8f2;
  --card:    #fffcf7;
  --border:  #e0c898;
  --red:     #8c1a1a;
  --red2:    #b02020;
  --gold:    #b8860b;
  --goldbg:  #fffbee;
  --ink:     #2c1810;
  --sub:     #7a5c48;
  --green:   #2d6a4f;
  --greenbg: #f0faf4;
  --aisle:   rgba(184,134,11,0.10);
}

*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { font-size: 16px; }
body {
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--ivory);
  color: var(--ink);
  min-height: 100vh;
}

/* ── Sync badge ─────────────────────────────── */
#sync-badge {
  position: fixed;
  top: 12px; right: 12px;
  display: flex; align-items: center; gap: 6px;
  padding: 5px 12px;
  border-radius: 20px;
  font-size: 12px;
  font-family: 'Noto Sans TC', sans-serif;
  z-index: 100;
  transition: all .3s;
  background: var(--greenbg);
  color: var(--green);
  border: 1px solid #a8d5c2;
  pointer-events: none;
}
#sync-badge.warn { background: #fff8e1; color: #8a6500; border-color: #e8c84a; }
#sync-dot {
  width: 7px; height: 7px;
  border-radius: 50%;
  background: var(--green);
  animation: pulse-dot 2s infinite;
}
#sync-badge.warn #sync-dot { background: #e8a000; animation: none; }
@keyframes pulse-dot { 0%,100%{opacity:1} 50%{opacity:.35} }

/* ── Page layout ────────────────────────────── */
.page {
  padding: clamp(12px,2vw,24px) clamp(12px,3vw,40px);
  max-width: 1400px;
  margin: 0 auto;
}

header {
  text-align: center;
  padding: clamp(16px,2.5vw,32px) 0 clamp(12px,2vw,20px);
}
.header-xi {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(32px,5vw,60px);
  color: var(--red);
  letter-spacing: .2em;
  line-height: 1;
  text-shadow: 0 1px 6px rgba(140,26,26,.15);
}
.header-title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(18px,2.5vw,30px);
  color: var(--ink);
  margin-top: 8px;
  letter-spacing: .12em;
}
.header-sub {
  font-size: clamp(12px,1.2vw,14px);
  color: var(--sub);
  margin-top: 5px;
  letter-spacing: .08em;
}

/* ── Main two-column grid ───────────────────── */
.main-grid {
  display: grid;
  grid-template-columns: 5fr 7fr;
  gap: clamp(12px,2vw,24px);
  align-items: start;
}

/* ── Search panel ───────────────────────────── */
.panel-box {
  background: var(--card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: clamp(14px,2vw,22px);
}

.panel-title {
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(15px,1.5vw,18px);
  color: var(--red);
  letter-spacing: .08em;
  margin-bottom: 14px;
  display: flex;
  align-items: center;
  gap: 7px;
}
.panel-title svg { flex-shrink: 0; }

.search-row {
  display: flex;
  gap: 8px;
  margin-bottom: 12px;
}
.search-input {
  flex: 1;
  padding: 10px 14px;
  border: 1px solid var(--border);
  border-radius: 8px;
  font-size: clamp(14px,1.3vw,16px);
  font-family: 'Noto Sans TC', sans-serif;
  background: var(--ivory);
  color: var(--ink);
  outline: none;
  transition: border-color .2s;
}
.search-input:focus { border-color: var(--gold); }
.search-input::placeholder { color: #b0926e; }

.btn {
  display: inline-flex; align-items: center; justify-content: center; gap: 6px;
  padding: 10px 16px;
  border: none; border-radius: 8px;
  font-size: clamp(13px,1.2vw,15px);
  font-family: 'Noto Sans TC', sans-serif;
  cursor: pointer;
  transition: all .15s;
  white-space: nowrap;
}
.btn-gold { background: var(--goldbg); color: var(--gold); border: 1px solid var(--border); }
.btn-gold:hover { background: #fff3c8; }
.btn-red { background: var(--red); color: #fff; }
.btn-red:hover { background: var(--red2); }
.btn-ghost { background: transparent; color: var(--sub); border: 1px solid var(--border); }
.btn-ghost:hover { background: var(--goldbg); }

/* Privacy lock */
.privacy-lock {
  display: flex; flex-direction: column; align-items: center; gap: 10px;
  padding: 32px 0;
  color: var(--sub);
}
.privacy-lock svg { opacity: .3; }
.privacy-lock p { font-size: clamp(13px,1.1vw,14px); letter-spacing: .04em; }

/* Result list */
.result-list { display: flex; flex-direction: column; gap: 8px; }
.result-card {
  background: var(--ivory);
  border: 1px solid var(--border);
  border-radius: 8px;
  padding: 10px 14px;
  cursor: pointer;
  transition: all .15s;
}
.result-card:hover { border-color: var(--gold); background: var(--goldbg); }
.result-name { font-size: clamp(15px,1.4vw,17px); font-weight: 500; color: var(--ink); }
.result-meta {
  font-size: clamp(12px,1vw,13px); color: var(--sub);
  margin-top: 4px; display: flex; gap: 10px; align-items: center; flex-wrap: wrap;
}
.status-tag {
  display: inline-flex; align-items: center; gap: 3px;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; font-weight: 500;
}
.status-tag.done { background: var(--greenbg); color: var(--green); }
.status-tag.todo { background: var(--goldbg); color: var(--gold); }
.status-tag.partial { background: #fff3e0; color: #b35a00; }
.group-tag {
  display: inline-flex; align-items: center;
  padding: 2px 8px; border-radius: 20px;
  font-size: 11px; color: var(--sub);
  background: var(--goldbg); border: 1px solid var(--border);
}
.no-result { text-align:center; padding:24px 0; color:var(--sub); font-size:14px; }

/* ── Floor plan panel ───────────────────────── */
.stage-bar {
  background: linear-gradient(135deg, #6b1414 0%, #a01818 50%, #6b1414 100%);
  color: rgba(255,255,255,.92);
  text-align: center;
  font-family: 'Noto Serif TC', serif;
  font-size: clamp(13px,1.2vw,15px);
  letter-spacing: .35em;
  padding: 7px 0;
  border-radius: 6px;
  margin-bottom: 14px;
}

.floor-wrap {
  width: 100%;
  aspect-ratio: 16/10;
  position: relative;
}

/* Grid: 6 col (col5=aisle 12px), 5 row (row3=aisle 12px) */
.floor-grid {
  position: absolute; inset: 0;
  display: grid;
  grid-template-columns: 1fr 1fr 1fr 1fr 12px 1fr;
  grid-template-rows: 1fr 1fr 12px 1fr 1fr;
  gap: 8px;
}

/* L-shaped aisle (single element, corner always connected) */
.aisle-L {
  grid-row: 3 / span 3;
  grid-column: 2 / span 4;
  border-top: 2px solid rgba(184,134,11,.6);
  border-right: 2px solid rgba(184,134,11,.6);
  pointer-events: none;
}

/* Table circle */
.tc {
  background: var(--card);
  border: 1.5px solid var(--border);
  border-radius: 50%;
  display: flex; flex-direction: column;
  align-items: center; justify-content: center;
  cursor: pointer;
  transition: border-color .15s, background .15s;
  overflow: hidden;
  padding: 3px;
  position: relative; z-index: 1;
  min-width: 0; min-height: 0;
}
.tc:hover { border-color: var(--gold); background: var(--goldbg); }
.tc.main-table { background: var(--goldbg); border-color: var(--gold); border-width: 2px; }
.tn { font-size: clamp(13px,1.5vw,17px); font-weight: 700; font-family: 'Noto Serif TC', serif; color: var(--red); line-height: 1.1; }
.tl { font-size: clamp(9px,1vw,12px); color: var(--sub); line-height: 1.2; text-align: center; max-width: 88%; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
.tcnt { font-size: clamp(8px,.8vw,10px); color: var(--sub); margin-top: 1px; }

/* Table highlight */
@keyframes table-glow {
  0%,100% { background:#ffeaea; border-color:#c0392b; box-shadow:0 0 6px rgba(192,57,43,.35); }
  50%      { background:#ffcaca; border-color:#e74c3c; box-shadow:0 0 20px rgba(231,76,60,.65), 0 0 36px rgba(231,76,60,.25); }
}
.tc.active { animation: table-glow 1.2s ease-in-out infinite; z-index: 2; border-width: 2px; }

/* ── Bottom sheet modal ──────────────────────── */
.overlay {
  position: fixed; inset: 0;
  background: rgba(44,24,16,.5);
  z-index: 200; display: none;
  align-items: flex-end;
  backdrop-filter: blur(2px);
}
.overlay.open { display: flex; }
.modal {
  width: 100%; max-width: 540px;
  margin: 0 auto;
  background: var(--card);
  border-radius: 16px 16px 0 0;
  border-top: 3px solid var(--red);
  padding: clamp(16px,3vw,28px);
  max-height: 85vh; overflow-y: auto;
  transform: translateY(100%);
  transition: transform .3s ease;
}
.overlay.open .modal { transform: translateY(0); }
.modal-drag { width: 36px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto 16px; }
.modal-title { font-family:'Noto Serif TC',serif; font-size:clamp(16px,1.8vw,20px); color:var(--red); letter-spacing:.06em; margin-bottom:4px; }
.modal-sub { font-size:clamp(12px,1.1vw,14px); color:var(--sub); margin-bottom:14px; }

.split-warn {
  background:#fff8e1; border:1px solid #e8c84a; border-radius:8px;
  padding:10px 14px; font-size:clamp(12px,1.1vw,13px); color:#8a6500;
  margin-bottom:12px; display:flex; gap:8px; align-items:flex-start;
}
.seating-breakdown {
  background:var(--goldbg); border:1px solid var(--border); border-radius:8px;
  padding:10px 14px; font-size:clamp(12px,1.1vw,13px); color:var(--sub);
  margin-bottom:14px;
}
.seating-breakdown table { width:100%; border-collapse:collapse; }
.seating-breakdown td { padding:3px 4px; }
.seating-breakdown td:last-child { text-align:right; color:var(--ink); font-weight:500; }

.guest-list { display:flex; flex-direction:column; gap:6px; margin-bottom:16px; }
.guest-row {
  display:flex; align-items:center; justify-content:space-between;
  padding:8px 12px; border:1px solid var(--border); border-radius:8px;
  background:var(--ivory);
}
.guest-check { display:flex; align-items:center; gap:8px; cursor:pointer; }
.guest-check input[type=checkbox] { width:18px; height:18px; accent-color:var(--green); cursor:pointer; }
.guest-name { font-size:clamp(14px,1.3vw,16px); color:var(--ink); }
.done-tag { font-size:11px; color:var(--green); background:var(--greenbg); padding:2px 8px; border-radius:20px; }
.cancel-btn {
  font-size:11px; color:#888; background:#f5f5f5;
  border:1px solid #ddd; padding:3px 10px; border-radius:6px; cursor:pointer;
}
.cancel-btn:hover { background:#fee; border-color:#fbb; color:#c0392b; }

/* ── QR overlay ──────────────────────────────── */
#qr-overlay {
  position:fixed; inset:0;
  background:rgba(0,0,0,.92);
  z-index:300; display:none;
  flex-direction:column; align-items:center; justify-content:center; gap:16px;
}
#qr-overlay.open { display:flex; }
#qr-reader { width:min(340px,90vw); border-radius:12px; overflow:hidden; }
#qr-reader video { width:100% !important; }
.qr-tip { color:#fff; font-size:15px; letter-spacing:.06em; }

/* ── Mobile tab bar ──────────────────────────── */
.tab-bar {
  display:none;
  position:fixed; bottom:0; left:0; right:0;
  background:var(--card); border-top:1px solid var(--border);
  z-index:50; padding:0 0 env(safe-area-inset-bottom);
}
.tab-bar-inner { display:flex; }
.tab-btn {
  flex:1; padding:12px 0 10px;
  display:flex; flex-direction:column; align-items:center; gap:3px;
  font-size:11px; color:var(--sub);
  background:none; border:none; cursor:pointer;
  transition:color .15s; font-family:'Noto Sans TC',sans-serif;
}
.tab-btn.active { color:var(--red); }
.tab-btn svg { transition:stroke .15s; }
.tab-btn.active svg { stroke:var(--red) !important; }

/* ── Responsive ─────────────────────────────── */
@media (max-width: 768px) {
  .main-grid { grid-template-columns:1fr; gap:0; padding-bottom:74px; }
  .tab-bar { display:block; }
  .panel-hidden { display:none !important; }
  .floor-wrap { aspect-ratio:4/3; }
}
@media (min-width:769px) and (max-width:1024px) {
  .main-grid { grid-template-columns:1fr 1fr; }
}
</style>
</head>
<body>

<!-- Sync badge -->
<div id="sync-badge">
  <div id="sync-dot"></div>
  <span id="sync-text">雲端連線正常</span>
</div>

<div class="page">
  <header>
    <div class="header-xi">囍</div>
    <div class="header-title">婚禮報到系統</div>
    <div class="header-sub">現場賓客報到與座位查詢</div>
  </header>

  <div class="main-grid">
    <!-- Search panel -->
    <section id="search-panel">
      <div class="panel-box">
        <div class="panel-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
          賓客搜尋
        </div>
        <div class="search-row">
          <input id="search-input" class="search-input" type="text" placeholder="輸入姓名搜尋…" autocomplete="off">
          <button class="btn btn-gold" id="qr-btn" title="掃描 QR Code">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/>
              <rect x="14" y="14" width="3" height="3"/><rect x="18" y="14" width="3" height="3"/>
              <rect x="14" y="18" width="3" height="3"/><rect x="18" y="18" width="3" height="3"/>
            </svg>
          </button>
        </div>
        <div id="results-area">
          <div class="privacy-lock" id="privacy-lock">
            <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
              <rect x="3" y="11" width="18" height="11" rx="2" ry="2"/><path d="M7 11V7a5 5 0 0 1 10 0v4"/>
            </svg>
            <p>請輸入姓名搜尋賓客</p>
          </div>
          <div class="result-list" id="result-list" style="display:none;"></div>
          <div class="no-result" id="no-result" style="display:none;">查無此賓客</div>
        </div>
      </div>
    </section>

    <!-- Floor plan panel -->
    <section id="floor-panel">
      <div class="panel-box">
        <div class="panel-title">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
          座位圖
        </div>
        <div class="stage-bar">舞　台</div>
        <div class="floor-wrap">
          <div class="floor-grid" id="floor-grid">
            <!-- L-shaped aisle (persistent) -->
            <div class="aisle-L"></div>
            <!-- table circles rendered by JS -->
          </div>
        </div>
      </div>
    </section>
  </div>
</div>

<!-- Mobile tab bar -->
<nav class="tab-bar">
  <div class="tab-bar-inner">
    <button class="tab-btn active" id="tab-search" onclick="switchTab('search')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      搜尋報到
    </button>
    <button class="tab-btn" id="tab-floor" onclick="switchTab('floor')">
      <svg width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="var(--sub)" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2"/><path d="M3 9h18M3 15h18M9 3v18"/></svg>
      座位圖
    </button>
  </div>
</nav>

<!-- Check-in modal -->
<div class="overlay" id="overlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modal">
    <div class="modal-drag"></div>
    <div class="modal-title" id="modal-title"></div>
    <div class="modal-sub" id="modal-sub"></div>
    <div id="split-warn" class="split-warn" style="display:none;">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      <span id="split-warn-text"></span>
    </div>
    <div id="seating-breakdown" class="seating-breakdown" style="display:none;">
      <table id="seating-table"></table>
    </div>
    <div class="guest-list" id="guest-list"></div>
    <button class="btn btn-red" id="confirm-btn" style="width:100%;font-size:16px;padding:12px;" onclick="confirmCheckin()">確認報到</button>
    <button class="btn btn-ghost" style="width:100%;margin-top:8px;" onclick="closeModal()">取消</button>
  </div>
</div>

<!-- QR scanner overlay -->
<div id="qr-overlay">
  <div class="qr-tip">掃描賓客 QR Code</div>
  <div id="qr-reader"></div>
  <button class="btn btn-ghost" style="color:#ccc;border-color:#555;" onclick="stopQR()">取消</button>
</div>

<script>
const API = 'https://script.google.com/macros/s/AKfycbzjNib56lrJMKki__XWhkOjiDOJn3a1sDkH8TveFQ8D4KSkjWJ394WnwwhDwsS2gkHd/exec';
const QUEUE_KEY = 'wedding_sync_queue';

let allGuests = [];
let allTables = [];
let qrScanner = null;
let currentModalGuests = [];

// Grid: col5=aisle, row3=aisle → tables shift accordingly
const GRID_POS = {
  "主桌": "grid-row:1/span 5;grid-column:1;align-self:center;height:60%",
  "1":   "grid-row:1;grid-column:2",
  "2":   "grid-row:1;grid-column:3",
  "3":   "grid-row:1;grid-column:4",
  "5":   "grid-row:1;grid-column:6",
  "6":   "grid-row:2;grid-column:2",
  "7":   "grid-row:2;grid-column:3",
  "8":   "grid-row:2;grid-column:4",
  "9":   "grid-row:2;grid-column:6",
  "10":  "grid-row:4;grid-column:2;transform:translateY(calc(50% + 4px))", // 在11和15中間
  "11":  "grid-row:4;grid-column:3",
  "12":  "grid-row:4;grid-column:4",
  "13":  "grid-row:4;grid-column:6",
  "15":  "grid-row:5;grid-column:3",
  "16":  "grid-row:5;grid-column:4",
  "17":  "grid-row:5;grid-column:6",
};

// ── Offline queue ─────────────────────────────
function getQueue()    { return JSON.parse(localStorage.getItem(QUEUE_KEY) || '[]'); }
function setQueue(q)   { localStorage.setItem(QUEUE_KEY, JSON.stringify(q)); }
function enqueue(ops)  { const q = getQueue(); q.push(...ops); setQueue(q); updateBadge(); }

async function flushQueue() {
  const q = getQueue();
  if (!q.length) return;
  try {
    const res = await fetch(API, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ action: 'batch_checkin', operations: q })
    });
    if (!res.ok) throw new Error();
    setQueue([]);
    updateBadge();
  } catch {}
}

function updateBadge() {
  const q = getQueue();
  const badge = document.getElementById('sync-badge');
  document.getElementById('sync-text').textContent =
    q.length ? `待同步 ${q.length} 筆` : '雲端連線正常';
  badge.classList.toggle('warn', q.length > 0);
}

setInterval(flushQueue, 5000);

// ── Data loading ──────────────────────────────
async function loadData() {
  try {
    const res = await fetch(API + '?action=getGuests');
    const data = await res.json();
    if (data.success) {
      allGuests = data.guests;
      allTables = data.tables;
      renderFloorPlan();
      flushQueue();
    }
  } catch { /* offline */ }
}

// ── Floor plan ────────────────────────────────
function renderFloorPlan() {
  const grid = document.getElementById('floor-grid');
  grid.querySelectorAll('.tc').forEach(el => el.remove());

  allTables.forEach(t => {
    const id = String(t.table_id);
    const pos = GRID_POS[id];
    if (!pos) return;

    const guestsAt = allGuests.filter(g => String(g.table) === id);
    const checked  = guestsAt.filter(g => g.status === '已報到').length;
    const total    = guestsAt.length;

    const div = document.createElement('div');
    div.className = 'tc' + (id === '主桌' ? ' main-table' : '');
    div.dataset.tableId = id;
    div.style.cssText = pos;
    div.onclick = () => showTableGuests(id);
    div.innerHTML =
      `<span class="tn">${id === '主桌' ? '主桌' : id}</span>` +
      `<span class="tl">${t.table_name || ''}</span>` +
      `<span class="tcnt">${checked}/${total}</span>`;
    grid.appendChild(div);
  });
}

function highlightTables(tableIds) {
  document.querySelectorAll('.tc').forEach(el => el.classList.remove('active'));
  if (!tableIds) return;
  (Array.isArray(tableIds) ? tableIds : [tableIds]).forEach(id => {
    const el = document.querySelector(`.tc[data-table-id="${id}"]`);
    if (el) el.classList.add('active');
  });
}

// ── Search ────────────────────────────────────
document.getElementById('search-input').addEventListener('input', function() {
  const q = this.value.trim();
  if (!q) { showLock(); return; }
  doSearch(q);
});

function showLock() {
  document.getElementById('privacy-lock').style.display = 'flex';
  document.getElementById('result-list').style.display  = 'none';
  document.getElementById('no-result').style.display    = 'none';
  highlightTables(null);
}

function doSearch(q) {
  const direct = allGuests.filter(g => g.name && g.name.includes(q));
  const groupIds = new Set(direct.map(g => g.groupId).filter(Boolean));
  const directIds = new Set(direct.map(g => g.id));

  // All members of matched groups (direct matches + their group-mates)
  const pool = allGuests.filter(g => directIds.has(g.id) || (g.groupId && groupIds.has(g.groupId)));

  document.getElementById('privacy-lock').style.display = 'none';

  if (!pool.length) {
    document.getElementById('result-list').style.display = 'none';
    document.getElementById('no-result').style.display   = 'block';
    highlightTables(null);
    return;
  }

  document.getElementById('no-result').style.display = 'none';
  const list = document.getElementById('result-list');
  list.style.display = 'flex';
  list.innerHTML = '';

  const allTableIds = [...new Set(pool.map(g => String(g.table)).filter(Boolean))];
  highlightTables(allTableIds);

  // One card per person (no merging of group names)
  pool.forEach(person => {
    const members = person.groupId
      ? allGuests.filter(m => m.groupId === person.groupId)
      : [person];
    const others = members.filter(m => m.id !== person.id);

    const done = person.status === '已報到';
    const card = document.createElement('div');
    card.className = 'result-card';
    // Click any card → open check-in modal for the whole group
    card.onclick = () => openModal(members);

    const tag = done
      ? '<span class="status-tag done">✓ 已報到</span>'
      : '<span class="status-tag todo">未報到</span>';

    const groupLabel = others.length
      ? `<span class="group-tag">同組：${others.map(m => m.name).join('、')}</span>`
      : '';

    card.innerHTML =
      `<div class="result-name">${person.name}</div>` +
      `<div class="result-meta"><span>${person.table} 桌</span>${tag}${groupLabel}</div>`;
    list.appendChild(card);
  });
}

// ── Modal ─────────────────────────────────────
function openModal(members) {
  currentModalGuests = members;
  const tables  = [...new Set(members.map(m => m.table).filter(Boolean))];
  const isSplit = tables.length > 1;

  document.getElementById('modal-title').textContent = members.map(m => m.name).join('、');
  document.getElementById('modal-sub').textContent   = '座位：' + tables.join('、') + ' 桌';

  // Split-table warning
  const sw = document.getElementById('split-warn');
  if (isSplit) {
    sw.style.display = 'flex';
    document.getElementById('split-warn-text').textContent =
      `此家庭安排於多桌：${tables.join('、')} 桌`;
  } else {
    sw.style.display = 'none';
  }

  // Seating breakdown
  const sb = document.getElementById('seating-breakdown');
  if (isSplit) {
    sb.style.display = 'block';
    document.getElementById('seating-table').innerHTML = tables.map(t => {
      const at = members.filter(m => String(m.table) === String(t));
      return `<tr><td>${t} 桌</td><td>${at.map(m => m.name).join('、')}</td></tr>`;
    }).join('');
  } else {
    sb.style.display = 'none';
  }

  // Guest rows (防呆: not-done = pre-checked, done = cancel only)
  const gl = document.getElementById('guest-list');
  gl.innerHTML = '';
  members.forEach(g => {
    const done = g.status === '已報到';
    const row  = document.createElement('div');
    row.className = 'guest-row';
    if (done) {
      row.innerHTML =
        `<div style="display:flex;align-items:center;gap:8px;">
           <span class="guest-name">${g.name}</span>
           <span class="done-tag">已報到</span>
         </div>
         <button class="cancel-btn" onclick="cancelCheckin('${g.id}')">取消報到</button>`;
    } else {
      row.innerHTML =
        `<label class="guest-check">
           <input type="checkbox" data-id="${g.id}" checked>
           <span class="guest-name">${g.name}</span>
         </label>`;
    }
    gl.appendChild(row);
  });

  // Show/hide confirm button
  const anyUnchecked = members.some(m => m.status !== '已報到');
  document.getElementById('confirm-btn').style.display = anyUnchecked ? 'flex' : 'none';

  document.getElementById('overlay').classList.add('open');
}

function confirmCheckin() {
  const ops = [];
  document.querySelectorAll('#guest-list input[type=checkbox]').forEach(cb => {
    if (!cb.checked) return;
    const g = allGuests.find(g => g.id === cb.dataset.id);
    if (g && g.status !== '已報到') {
      g.status = '已報到';
      ops.push({ id: g.id, action: 'checkin' });
    }
  });
  if (ops.length) enqueue(ops);

  const tables = [...new Set(currentModalGuests.map(m => String(m.table)))];
  closeModal();
  renderFloorPlan();

  if (window.innerWidth <= 768) switchTab('floor');
  highlightTables(tables);
}

function cancelCheckin(guestId) {
  const g = allGuests.find(g => g.id === guestId);
  if (!g) return;
  g.status = '未報到';
  enqueue([{ id: guestId, action: 'cancel' }]);
  renderFloorPlan();
  openModal(currentModalGuests); // re-render modal
}

function closeModal() { document.getElementById('overlay').classList.remove('open'); }
function handleOverlayClick(e) { if (e.target === document.getElementById('overlay')) closeModal(); }
function showTableGuests(tableId) {
  const m = allGuests.filter(g => String(g.table) === tableId);
  if (m.length) openModal(m);
}

// ── QR scanner ────────────────────────────────
document.getElementById('qr-btn').onclick = startQR;

function startQR() {
  document.getElementById('qr-overlay').classList.add('open');
  qrScanner = new Html5Qrcode('qr-reader');
  qrScanner.start(
    { facingMode: 'environment' },
    { fps: 10, qrbox: { width: 240, height: 240 } },
    decodedText => {
      stopQR();
      const q = decodedText.trim();
      document.getElementById('search-input').value = q;
      doSearch(q);
    },
    () => {}
  ).catch(() => stopQR());
}

function stopQR() {
  if (qrScanner) { qrScanner.stop().catch(() => {}); qrScanner = null; }
  document.getElementById('qr-overlay').classList.remove('open');
}

// ── Tab switching (mobile) ────────────────────
function switchTab(tab) {
  const sp = document.getElementById('search-panel');
  const fp = document.getElementById('floor-panel');
  const ts = document.getElementById('tab-search');
  const tf = document.getElementById('tab-floor');

  if (tab === 'search') {
    sp.classList.remove('panel-hidden'); fp.classList.add('panel-hidden');
    ts.classList.add('active'); tf.classList.remove('active');
  } else {
    fp.classList.remove('panel-hidden'); sp.classList.add('panel-hidden');
    tf.classList.add('active'); ts.classList.remove('active');
  }
}

// ── Init ──────────────────────────────────────
updateBadge();
loadData();
</script>

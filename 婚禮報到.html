<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚禮賓客報到系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f5f0; }
        .table-active { background-color: #fca5a5 !important; border-color: #ef4444 !important; transform: scale(1.05); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-stone-800 mb-2">✨ Our Wedding Guest Check-In ✨</h1>
            <p class="text-stone-500">婚禮現場賓客報到與座位查詢系統</p>
        </header>

        <div class="bg-white rounded-2xl p-6 shadow-sm border border-stone-200 mb-8">
            <h2 class="text-lg font-semibold text-stone-700 mb-4">📊 現場報到進度</h2>
            <div class="grid grid-cols-3 gap-4 text-center mb-4">
                <div class="bg-stone-50 p-3 rounded-xl">
                    <p class="text-xs text-stone-500">應到人數</p>
                    <p id="total-count" class="text-2xl font-bold text-stone-700">0</p>
                </div>
                <div class="bg-emerald-50 p-3 rounded-xl">
                    <p class="text-xs text-emerald-600">已到人數</p>
                    <p id="checked-count" class="text-2xl font-bold text-emerald-600">0</p>
                </div>
                <div class="bg-amber-50 p-3 rounded-xl">
                    <p class="text-xs text-amber-600">未到人數</p>
                    <p id="unchecked-count" class="text-2xl font-bold text-amber-600">0</p>
                </div>
            </div>
            <div class="w-full bg-stone-100 rounded-full h-4 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-emerald-400 to-teal-500 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="progress-text" class="text-right text-xs text-stone-500 mt-2">目前報到率：0%</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="lg:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-stone-200">
                <h2 class="text-lg font-semibold text-stone-700 mb-4">🔍 賓客搜尋簽到</h2>
                
                <div class="mb-6">
                    <input type="text" id="search-input" placeholder="請輸入賓客姓名（如：王小明）..." 
                           class="w-full px-4 py-3 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-rose-300 text-lg">
                </div>

                <div class="overflow-y-auto max-h-[400px] divide-y divide-stone-100" id="guest-list">
                    <p class="text-center text-stone-400 py-8">正在連線至雲端試算表載入名單...</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-stone-200">
                <h2 class="text-lg font-semibold text-stone-700 mb-2">📍 宴會廳座位圖</h2>
                <p class="text-xs text-stone-400 mb-6">點擊簽到時，對應的桌次會放大並呈現紅色提示</p>
                
                <div class="w-full bg-rose-100 text-rose-700 text-center py-2 rounded-lg font-medium text-sm mb-8 shadow-inner">
                    舞台 (Stage)
                </div>

                <div class="grid grid-cols-2 gap-6" id="floor-plan">
                    <div id="table-主桌" class="border-2 border-stone-300 rounded-full aspect-square flex flex-col items-center justify-center bg-stone-50 transition-all duration-300">
                        <span class="font-bold text-stone-700">主桌</span>
                    </div>
                    <div id="table-男方親友" class="border-2 border-stone-300 rounded-full aspect-square flex flex-col items-center justify-center bg-stone-50 transition-all duration-300">
                        <span class="font-bold text-stone-700">男方親友</span>
                    </div>
                    <div id="table-女方親友" class="border-2 border-stone-300 rounded-full aspect-square flex flex-col items-center justify-center bg-stone-50 transition-all duration-300">
                        <span class="font-bold text-stone-700">女方親友</span>
                    </div>
                    <div id="table-大學同學" class="border-2 border-stone-300 rounded-full aspect-square flex flex-col items-center justify-center bg-stone-50 transition-all duration-300">
                        <span class="font-bold text-stone-700">大學同學</span>
                    </div>
                    <div id="table-公司同事" class="border-2 border-stone-300 rounded-full aspect-square flex flex-col items-center justify-center bg-stone-50 transition-all duration-300">
                        <span class="font-bold text-stone-700">公司同事</span>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-xl transform scale-95 transition-transform duration-300">
            <div class="text-5xl mb-4">🎉</div>
            <h3 class="text-2xl font-bold text-stone-800 mb-2">歡迎光臨！</h3>
            <p id="modal-name" class="text-xl font-medium text-rose-600 mb-1">---</p>
            <p class="text-stone-500 mb-6">您的座位在：<span id="modal-table" class="font-bold text-stone-800 bg-amber-100 px-2 py-1 rounded">---</span></p>
            <button onclick="closeModal()" class="w-full bg-stone-800 text-white py-3 rounded-xl font-medium hover:bg-stone-700 transition">
                確認
            </button>
        </div>
    </div>

    <script>
        // 已更換為你的 Google Apps Script 網頁應用程式 URL
        const API_URL = "https://script.google.com/macros/s/AKfycbzjNib56lrJMKki__XWhkOjiDOJn3a1sDkH8TveFQ8D4KSkjWJ394WnwwhDwsS2gkHd/exec"; 

        let guests = [];

        // 頁面初始化
        document.addEventListener("DOMContentLoaded", async () => {
            await fetchGuests();
            
            // 監聽搜尋輸入
            document.getElementById("search-input").addEventListener("input", (e) => {
                const keyword = e.target.value.trim();
                const filtered = guests.filter(g => g.name.includes(keyword));
                renderList(filtered);
            });
        });

        // 從 Google Sheets 獲取賓客名單 (GET)
        async function fetchGuests() {
            try {
                const response = await fetch(API_URL);
                guests = await response.json();
                renderDashboard();
                renderList(guests);
            } catch (error) {
                console.error("無法讀取賓客名單:", error);
                document.getElementById("guest-list").innerHTML = `<p class="text-center text-red-500 py-8">⚠️ 無法連線至後台，請確認網路或 Apps Script 部署設定。</p>`;
            }
        }

        // 更新頂部儀表板進度
        function renderDashboard() {
            const total = guests.length;
            const checked = guests.filter(g => g.status === "已報到").length;
            const unchecked = total - checked;
            const percentage = total > 0 ? Math.round((checked / total) * 100) : 0;

            document.getElementById("total-count").innerText = total;
            document.getElementById("checked-count").innerText = checked;
            document.getElementById("unchecked-count").innerText = unchecked;
            document.getElementById("progress-bar").style.width = `${percentage}%`;
            document.getElementById("progress-text").innerText = `目前報到率：${percentage}%`;
        }

        // 渲染賓客搜尋列表
        function renderList(data) {
            const listContainer = document.getElementById("guest-list");
            listContainer.innerHTML = "";

            if (data.length === 0) {
                listContainer.innerHTML = `<p class="text-center text-stone-400 py-8">找不到相符的賓客姓名</p>`;
                return;
            }

            data.forEach(guest => {
                const item = document.createElement("div");
                item.className = "flex items-center justify-between py-4 transition-colors duration-200";
                
                const isChecked = guest.status === "已報到";
                
                item.innerHTML = `
                    <div>
                        <span class="text-lg font-medium text-stone-800">${guest.name}</span>
                        <span class="ml-3 text-xs bg-stone-100 text-stone-600 px-2 py-1 rounded-full">${guest.table}</span>
                    </div>
                    <div>
                        ${isChecked 
                            ? `<span class="text-sm text-emerald-600 font-medium bg-emerald-50 px-3 py-1.5 rounded-lg">✓ 已報到</span>`
                            : `<button onclick="checkIn(${guest.id})" class="text-sm bg-rose-500 text-white px-4 py-1.5 rounded-lg hover:bg-rose-600 font-medium shadow-sm transition">確認報到</button>`
                        }
                    </div>
                `;
                listContainer.appendChild(item);
            });
        }

        // 點擊「確認報到」時，同步發送 POST 請求更新後台 Google Sheet
        async function checkIn(id) {
            const guest = guests.find(g => g.id === id);
            if (!guest) return;

            // 先在前端呈現已報到狀態（優化使用者體驗，避免現場點擊卡頓）
            guest.status = "已報到";
            renderDashboard();
            renderList(guests);

            try {
                // 發送 POST 請求給 Google Apps Script
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ id: id })
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById("search-input").value = ""; // 清空搜尋欄
                    
                    // 顯示彈出視窗
                    document.getElementById("modal-name").innerText = guest.name;
                    document.getElementById("modal-table").innerText = `${guest.table}桌`;
                    const modal = document.getElementById("success-modal");
                    modal.classList.remove("hidden");
                    modal.classList.add("flex");

                    // 座位圖連動
                    highlightTable(guest.table);
                } else {
                    alert("後台更新失敗：" + result.message);
                    await fetchGuests(); // 失敗則重新同步真實名單
                }
            } catch (error) {
                console.error("報到請求失敗:", error);
                alert("網路連線異常，簽到資料可能未同步，請重試！");
                await fetchGuests();
            }
        }

        // 座位圖高亮效果
        function highlightTable(tableName) {
            // 先清除所有桌子的紅色高亮
            document.querySelectorAll("#floor-plan > div").forEach(el => el.classList.remove("table-active"));
            
            // 根據試算表傳來的桌名找到對應的 HTML 元素並加上高亮（如 id="table-主桌"）
            const targetTable = document.getElementById(`table-${tableName}`);
            if (targetTable) {
                targetTable.classList.add("table-active");
            }
        }

        // 關閉彈出視窗
        function closeModal() {
            const modal = document.getElementById("success-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚禮賓客現場報到與座位查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f5f0; }
        .table-active { background-color: #fca5a5 !important; border-color: #ef4444 !important; transform: scale(1.15) !important; z-index: 50; box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.4); }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="w-full mx-auto px-1 md:px-4">
        <header class="text-center mb-5">
            <h1 class="text-3xl font-bold text-stone-800 mb-1">✨ Our Wedding Guest Check-In ✨</h1>
            <p class="text-stone-500 text-sm">婚禮現場賓客報到與座位查詢系統</p>
        </header>

        <div class="bg-white rounded-2xl p-4 shadow-sm border border-stone-200 mb-5">
            <div class="grid grid-cols-3 gap-4 text-center mb-3">
                <div class="bg-stone-50 p-2.5 rounded-xl">
                    <p class="text-xs text-stone-500">應到人數</p>
                    <p id="total-count" class="text-2xl font-bold text-stone-700">0</p>
                </div>
                <div class="bg-emerald-50 p-2.5 rounded-xl">
                    <p class="text-xs text-emerald-600">已到人數</p>
                    <p id="checked-count" class="text-2xl font-bold text-emerald-600">0</p>
                </div>
                <div class="bg-amber-50 p-2.5 rounded-xl">
                    <p class="text-xs text-amber-600">未到人數</p>
                    <p id="unchecked-count" class="text-2xl font-bold text-amber-600">0</p>
                </div>
            </div>
            <div class="w-full bg-stone-100 rounded-full h-3.5 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-emerald-400 to-teal-500 h-3.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="progress-text" class="text-right text-[11px] text-stone-500 mt-1">目前報到率：0%</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 w-full">
            
            <div class="lg:col-span-5 bg-white rounded-2xl p-5 shadow-sm border border-stone-200 flex flex-col">
                <h2 class="text-lg font-semibold text-stone-700 mb-3">🔍 賓客搜尋簽到</h2>
                <div class="mb-4">
                    <input type="text" id="search-input" placeholder="請輸入賓客姓名（如：王小明）..." 
                           class="w-full px-4 py-2.5 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-rose-300 text-lg">
                </div>
                <div class="overflow-y-auto max-h-[580px] divide-y divide-stone-100 flex-1" id="guest-list">
                    <p class="text-center text-stone-400 py-8">正在連線至雲端試算表載入名單...</p>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white rounded-2xl p-5 shadow-sm border border-stone-200">
                <h2 class="text-lg font-semibold text-stone-700 mb-1">📍 宴會廳座位圖</h2>
                <p class="text-xs text-stone-400 mb-4">完全依照試算表配置呈現（左側舞台視角）</p>
                
                <div class="w-full relative bg-stone-100 border border-stone-200 rounded-2xl shadow-inner p-4 flex gap-4 items-stretch">
                    <div class="w-12 bg-rose-100 border border-rose-200 text-rose-700 flex items-center justify-center rounded-xl font-bold text-sm text-center px-2 shadow-sm" style="writing-mode: vertical-lr;">
                        舞 台 (Stage)
                    </div>

                    <div class="flex-1 bg-white border border-stone-200 rounded-xl shadow-sm p-2 flex items-center justify-center overflow-hidden">
                        <div id="floor-plan" class="w-full h-[360px] md:h-[390px] relative"></div>
                    </div>
                </div>
            </div>

        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-xl transform scale-95 transition-transform duration-300">
            <div class="text-5xl mb-4">🎉</div>
            <h3 class="text-2xl font-bold text-stone-800 mb-2">歡迎光臨！</h3>
            <p id="modal-name" class="text-xl font-medium text-rose-600 mb-1">---</p>
            <p class="text-stone-500 mb-6">您的座位在：<span id="modal-table" class="font-bold text-stone-800 bg-amber-100 px-2 py-1 rounded">---</span></p>
            <button onclick="closeModal()" class="w-full bg-stone-800 text-white py-3 rounded-xl font-medium hover:bg-stone-700 transition">確認</button>
        </div>
    </div>

    <script>
        const API_URL = "https://script.google.com/macros/s/AKfycbzjNib56lrJMKki__XWhkOjiDOJn3a1sDkH8TveFQ8D4KSkjWJ394WnwwhDwsS2gkHd/exec"; 

        let guests = [];
        let tables = [];

        document.addEventListener("DOMContentLoaded", async () => {
            await fetchGuests();
            
            document.getElementById("search-input").addEventListener("input", (e) => {
                const keyword = e.target.value.trim();
                const filtered = guests.filter(g => g.name.includes(keyword));
                renderList(filtered);
            });
        });

        async function fetchGuests() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error("HTTP 錯誤！狀態碼: " + response.status);
                
                const resData = await response.json();
                
                // 100% 信任後台資料呈現
                guests = resData.guests;
                tables = resData.tables;
                
                renderDashboard();
                renderList(guests);
                renderFloorPlan(); 
            } catch (error) {
                console.error("無法讀取賓客名單:", error);
                document.getElementById("guest-list").innerHTML = '<p class="text-center text-red-500 py-8">連線失敗，請檢查後台部署。</p>';
            }
        }

        function renderFloorPlan() {
            const floorPlanContainer = document.getElementById("floor-plan");
            floorPlanContainer.innerHTML = ""; 

            floorPlanContainer.className = "w-full h-full grid grid-cols-5 grid-rows-4 gap-2 md:gap-4 p-2 relative";

            // 調整中央走道橘色背板線，完美穿插在第2列與第3列正中間
            const lineH = document.createElement("div");
            lineH.style.cssText = "position: absolute; left: 22%; width: 55%; top: 50%; height: 6px; transform: translateY(-3px);";
            lineH.className = "bg-orange-400 rounded-full z-0 opacity-40 shadow-sm";
            floorPlanContainer.appendChild(lineH);

            const lineV = document.createElement("div");
            lineV.style.cssText = "position: absolute; left: 78%; top: 50%; height: 48%; width: 6px; transform: translateX(-3px);";
            lineV.className = "bg-orange-400 rounded-full z-0 opacity-40 shadow-sm";
            floorPlanContainer.appendChild(lineV);

            // 【終極校正網格對照表】完全對齊平面圖
            const gridPositions = {
                "主桌": "grid-row: 2 / span 2; grid-column: 1;", // 主桌縱向跨越第2,3列，置中且消滅紅圈空白
                "1": "grid-row: 1; grid-column: 2;",
                "6": "grid-row: 2; grid-column: 2;",
                "10": "grid-row: 3; grid-column: 2;", // 10號桌移回第3列，精準對齊 11 桌
                "2": "grid-row: 1; grid-column: 3;",
                "7": "grid-row: 2; grid-column: 3;",
                "11": "grid-row: 3; grid-column: 3;", 
                "15": "grid-row: 4; grid-column: 3;", 
                "3": "grid-row: 1; grid-column: 4;",
                "8": "grid-row: 2; grid-column: 4;",
                "12": "grid-row: 3; grid-column: 4;", 
                "16": "grid-row: 4; grid-column: 4;", 
                "5": "grid-row: 1; grid-column: 5;",  
                "9": "grid-row: 2; grid-column: 5;",
                "13": "grid-row: 3; grid-column: 5;",
                "17": "grid-row: 4; grid-column: 5;"
            };

            const colors = ['text-rose-500 bg-rose-50 border-rose-200', 'text-blue-500 bg-blue-50 border-blue-200', 'text-purple-500 bg-purple-50 border-purple-200', 'text-amber-500 bg-amber-50 border-amber-200', 'text-emerald-500 bg-emerald-50 border-emerald-200'];

            tables.forEach((t, index) => {
                const colorClass = colors[index % colors.length];
                const tableDiv = document.createElement("div");
                
                const cleanId = String(t.table_id).replace(".0", "").trim();
                tableDiv.id = "table-" + cleanId;
                
                let baseStyle = "aspect-square rounded-full flex flex-col items-center justify-center transition-all duration-300 p-1 text-center shadow-sm border bg-white self-center justify-self-center w-full max-w-[72px] md:max-w-[85px] z-20 ";
                
                if (cleanId === "主桌" || String(t.table_name).includes("主桌")) {
                    tableDiv.className = baseStyle + "border-amber-400 ring-4 ring-amber-100 ring-offset-1 font-bold text-amber-800 text-xs md:text-sm scale-110";
                    tableDiv.innerHTML = '<span>主桌</span>';
                } else {
                    tableDiv.className = baseStyle + "border-stone-200 hover:border-stone-400";
                    tableDiv.innerHTML = '<span class="text-[9px] md:text-[10px] font-bold ' + colorClass + ' border px-1 rounded-full mb-0.5">' + cleanId + '</span>' +
                                         '<span class="font-bold text-stone-700 text-[10px] md:text-[11px] truncate max-w-full px-0.5">' + t.table_name + '</span>';
                }

                const cssPos = gridPositions[cleanId];
                if (cssPos) {
                    tableDiv.style.cssText = cssPos;
                    floorPlanContainer.appendChild(tableDiv);
                }
            });
        }

        function renderList(data) {
            const listContainer = document.getElementById("guest-list");
            listContainer.innerHTML = "";

            if (data.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-stone-400 py-8">找不到相符的賓客姓名</p>';
                return;
            }

            data.forEach(guest => {
                const item = document.createElement("div");
                item.className = "flex items-center justify-between py-3.5 transition-colors duration-200";
                const isChecked = guest.status === "已報到";
                
                const tObj = tables.find(t => {
                    return String(t.table_id).replace(".0", "").trim().toLowerCase() === String(guest.table).replace(".0", "").trim().toLowerCase();
                });
                
                // 左側灰底標籤格式化
                let tableNameText = "";
                if (tObj) {
                    const cleanId = String(tObj.table_id).replace(".0", "").trim();
                    if (cleanId === "主桌" || String(tObj.table_name).includes("主桌")) {
                        tableNameText = "主桌";
                    } else {
                        tableNameText = cleanId + "桌(" + tObj.table_name + ")"; 
                    }
                } else {
                    tableNameText = guest.table + "桌(未配置)";
                }

                let buttonHTML = isChecked 
                    ? '<div class="flex items-center gap-2">' +
                      '<span class="text-sm text-emerald-600 font-medium bg-emerald-50 px-2.5 py-1.5 rounded-lg">✓ 已報到</span>' +
                      '<button onclick="toggleCheckIn(' + guest.id + ', false)" class="text-xs text-stone-400 bg-stone-100 hover:bg-stone-200 px-2 py-1.5 rounded-lg transition">取消</button>' +
                      '</div>'
                    : '<button onclick="toggleCheckIn(' + guest.id + ', true)" class="text-sm bg-rose-500 text-white px-4 py-1.5 rounded-lg hover:bg-rose-600 font-medium shadow-sm transition">確認報到</button>';

                item.innerHTML = '<div>' +
                                 '<span class="text-lg font-medium text-stone-800">' + guest.name + '</span>' +
                                 '<span class="ml-3 text-xs bg-stone-100 text-stone-600 px-2.5 py-1 rounded-full font-medium">' + tableNameText + '</span>' +
                                 '</div><div>' + buttonHTML + '</div>';
                listContainer.appendChild(item);
            });
        }

        async function toggleCheckIn(id, shouldCheckIn) {
            const guest = guests.find(g => g.id === id);
            if (!guest) return;

            guest.status = shouldCheckIn ? "已報到" : "未報到";
            renderDashboard();
            renderList(guests);

            if (!shouldCheckIn) {
                document.querySelectorAll("#floor-plan > div").forEach(el => el.classList.remove("table-active"));
            }

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ id: id, action: shouldCheckIn ? "checkin" : "cancel" })
                });
                const result = await response.json();
                
                if (result.success && shouldCheckIn) {
                    document.getElementById("search-input").value = "";
                    const tObj = tables.find(t => String(t.table_id).replace(".0", "").trim() === String(guest.table).replace(".0", "").trim());
                    
                    let modalTableText = guest.table + "桌";
                    if (tObj) {
                        modalTableText = String(tObj.table_id).includes("主桌") || String(tObj.table_name).includes("主桌")
                            ? "主桌" : tObj.table_id + "桌(" + tObj.table_name + ")";
                    }

                    document.getElementById("modal-name").innerText = guest.name;
                    document.getElementById("modal-table").innerText = modalTableText;
                    
                    const modal = document.getElementById("success-modal");
                    modal.classList.remove("hidden");
                    modal.classList.add("flex");

                    highlightTable(guest.table);
                }
            } catch (error) {
                console.error("請求失敗:", error);
                alert("網路連線異常，簽到狀態同步失敗！");
                await fetchGuests();
            }
        }

        function highlightTable(tableId) {
            document.querySelectorAll("#floor-plan > div").forEach(el => el.classList.remove("table-active"));
            const cleanId = String(tableId).replace(".0", "").trim();
            const targetTable = document.getElementById("table-" + cleanId);
            if (targetTable) targetTable.classList.add("table-active");
        }

        document.addEventListener("click", (e) => {
            if (e.target.tagName !== "BUTTON" && e.target.tagName !== "INPUT" && !e.target.closest("#success-modal")) {
                document.querySelectorAll("#floor-plan > div").forEach(el => el.classList.remove("table-active"));
            }
        });

        function closeModal() {
            const modal = document.getElementById("success-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }

        function renderDashboard() {
            const total = guests.length;
            const checked = guests.filter(g => g.status === "已報到").length;
            const unchecked = total - checked;
            const percentage = total > 0 ? Math.round((checked / total) * 100) : 0;

            document.getElementById("total-count").innerText = total;
            document.getElementById("checked-count").innerText = checked;
            document.getElementById("unchecked-count").innerText = unchecked;
            document.getElementById("progress-bar").style.width = percentage + "%";
            document.getElementById("progress-text").innerText = "目前報到率：" + percentage + "%";
        }
    </script>
</body>
</html>

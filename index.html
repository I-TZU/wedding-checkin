<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚禮賓客報到系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f5f0; }
        /* 點擊確認報到時，座位圖圓圈的放大紅色高亮動畫樣式 */
        .table-active { background-color: #fca5a5 !important; border-color: #ef4444 !important; transform: scale(1.15); z-index: 50; box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.3); }
    </style>
</head>
<body class="p-4 md:p-8">

    <div class="max-w-6xl mx-auto">
        <header class="text-center mb-8">
            <h1 class="text-3xl font-bold text-stone-800 mb-2">✨ Our Wedding Guest Check-In ✨</h1>
            <p class="text-stone-500">婚禮現場賓客報到與座位查詢系統</p>
        </header>

        <div class="bg-white rounded-2xl p-6 shadow-sm border border-stone-200 mb-8">
            <h2 class="text-lg font-semibold text-stone-700 mb-4">📊 現場報到進度</h2>
            <div class="grid grid-cols-3 gap-4 text-center mb-4">
                <div class="bg-stone-50 p-3 rounded-xl">
                    <p class="text-xs text-stone-500">應到人數</p>
                    <p id="total-count" class="text-2xl font-bold text-stone-700">0</p>
                </div>
                <div class="bg-emerald-50 p-3 rounded-xl">
                    <p class="text-xs text-emerald-600">已到人數</p>
                    <p id="checked-count" class="text-2xl font-bold text-emerald-600">0</p>
                </div>
                <div class="bg-amber-50 p-3 rounded-xl">
                    <p class="text-xs text-amber-600">未到人數</p>
                    <p id="unchecked-count" class="text-2xl font-bold text-amber-600">0</p>
                </div>
            </div>
            <div class="w-full bg-stone-100 rounded-full h-4 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-emerald-400 to-teal-500 h-4 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="progress-text" class="text-right text-xs text-stone-500 mt-2">目前報到率：0%</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            
            <div class="lg:col-span-2 bg-white rounded-2xl p-6 shadow-sm border border-stone-200">
                <h2 class="text-lg font-semibold text-stone-700 mb-4">🔍 賓客搜尋簽到</h2>
                
                <div class="mb-6">
                    <input type="text" id="search-input" placeholder="請輸入賓客姓名（如：王小明）..." 
                           class="w-full px-4 py-3 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-rose-300 text-lg">
                </div>

                <div class="overflow-y-auto max-h-[450px] divide-y divide-stone-100" id="guest-list">
                    <p class="text-center text-stone-400 py-8">正在連線至雲端試算表載入名單...</p>
                </div>
            </div>

            <div class="bg-white rounded-2xl p-6 shadow-sm border border-stone-200">
                <h2 class="text-lg font-semibold text-stone-700 mb-2">📍 宴會廳座位圖</h2>
                <p class="text-xs text-stone-400 mb-6">座位由試算表自動生成，點擊確認報到時對應桌次會高亮提示</p>
                
                <div class="flex gap-4 items-stretch min-h-[400px]">
                    
                    <div class="w-12 bg-rose-100 text-rose-700 flex items-center justify-center rounded-xl font-bold text-sm shadow-inner text-center px-2" style="writing-mode: vertical-lr;">
                        舞 台 (Stage)
                    </div>

                    <div class="flex-1 grid grid-cols-5 gap-y-6 gap-x-4 relative bg-stone-50 p-4 rounded-xl border border-stone-100 shadow-inner overflow-hidden" id="floor-plan">
                        </div>
                    
                </div>
            </div>

        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-xl transform scale-95 transition-transform duration-300">
            <div class="text-5xl mb-4">🎉</div>
            <h3 class="text-2xl font-bold text-stone-800 mb-2">歡迎光臨！</h3>
            <p id="modal-name" class="text-xl font-medium text-rose-600 mb-1">---</p>
            <p class="text-stone-500 mb-6">您的座位在：<span id="modal-table" class="font-bold text-stone-800 bg-amber-100 px-2 py-1 rounded">---</span></p>
            <button onclick="closeModal()" class="w-full bg-stone-800 text-white py-3 rounded-xl font-medium hover:bg-stone-700 transition">
                確認
            </button>
        </div>
    </div>

    <script>
        // 已對齊你部署的 Google Apps Script 網頁應用程式 URL
        const API_URL = "https://script.google.com/macros/s/AKfycbzjNib56lrJMKki__XWhkOjiDOJn3a1sDkH8TveFQ8D4KSkjWJ394WnwwhDwsS2gkHd/exec"; 

        let guests = [];
        let tables = [];

        // 網頁加載完畢初始化
        document.addEventListener("DOMContentLoaded", async () => {
            await fetchGuests();
            
            // 綁定即時模糊搜尋監聽器
            document.getElementById("search-input").addEventListener("input", (e) => {
                const keyword = e.target.value.trim();
                const filtered = guests.filter(g => g.name.includes(keyword));
                renderList(filtered);
            });
        });

        // 呼叫 API 取回試算表的雙分頁打包資料
        async function fetchGuests() {
            try {
                const response = await fetch(API_URL);
                const resData = await response.json();
                
                guests = resData.guests; // 儲存賓客清單
                tables = resData.tables; // 儲存桌次對照表
                
                renderDashboard();
                renderList(guests);
                renderFloorPlan(); // 自動繪製旋轉 180 度的地圖
            } catch (error) {
                console.error("無法讀取賓客名單:", error);
                document.getElementById("guest-list").innerHTML = '<p class="text-center text-red-500 py-8">⚠️ 無法連線至後台，請確認網路與試算表分頁名稱設定。</p>';
            }
        }

        // 依照 180 度逆時針旋轉圖面，精準定義 $4 \times 5$ 的 2D 矩陣擺放座標
        function renderFloorPlan() {
            const floorPlanContainer = document.getElementById("floor-plan");
            floorPlanContainer.innerHTML = ""; // 清空外殼

            // 完美的 2D 棋盤座標映射表 (網頁第 1 欄保留給左側舞台，座位從第 2 欄開始)
            const finalGrid = {
                "主桌": "grid-row: 2/span 2; grid-column: 2; align-self: center; justify-self: center;",
                "1": "grid-row: 1; grid-column: 3;",
                "2": "grid-row: 1; grid-column: 4;",
                "3": "grid-row: 1; grid-column: 5; margin-right: 50px;",
                "5": "grid-row: 1; grid-column: 5; margin-left: auto;",
                "6": "grid-row: 2; grid-column: 3;",
                "7": "grid-row: 2; grid-column: 4;",
                "8": "grid-row: 2; grid-column: 5; margin-right: 50px;",
                "9": "grid-row: 2; grid-column: 5; margin-left: auto; transform: translateY(35px); z-index:20;",
                "11": "grid-row: 3; grid-column: 4; transform: translateY(-10px);",
                "12": "grid-row: 3; grid-column: 5; margin-right: 50px; transform: translateY(-10px);",
                "13": "grid-row: 3; grid-column: 5; margin-left: auto; transform: translateY(25px); z-index:20;",
                "10": "grid-row: 3; grid-column: 2; align-self: end; justify-self: center; transform: translateY(15px);",
                "15": "grid-row: 4; grid-column: 3;",
                "16": "grid-row: 4; grid-column: 4;",
                "17": "grid-row: 4; grid-column: 5; margin-left: auto;"
            };

            // 圓圈標籤色彩池
            const colors = [
                'text-rose-500 bg-rose-50 border-rose-200', 
                'text-blue-500 bg-blue-50 border-blue-200', 
                'text-purple-500 bg-purple-50 border-purple-200', 
                'text-amber-500 bg-amber-50 border-amber-200', 
                'text-emerald-500 bg-emerald-50 border-emerald-200', 
                'text-teal-500 bg-teal-50 border-teal-200', 
                'text-indigo-500 bg-indigo-50 border-indigo-200'
            ];

            // 動態繪製【橫向橘色背板線條】
            const lineH = document.createElement("div");
            lineH.style = "grid-row: 2; grid-column: 3/span 2; align-self: end; height: 10px; transform: translateY(14px);";
            lineH.className = "bg-orange-400 rounded-full z-10 shadow-sm";
            floorPlanContainer.appendChild(lineH);

            // 動態繪製【縱向橘色背板線條】
            const lineV = document.createElement("div");
            lineV.style = "grid-row: 2/span 3; grid-column: 4; justify-self: end; width: 10px; transform: translateX(12px); height: 105%;";
            lineV.className = "bg-orange-400 rounded-full z-10 shadow-sm";
            floorPlanContainer.appendChild(lineV);

            // 動態產生每一張桌子的圓圈
            tables.forEach((t, index) => {
                const colorClass = colors[index % colors.length];
                const tableDiv = document.createElement("div");
                tableDiv.id = "table-" + t.table_id;
                
                // 固定寬高圓圈、陰影與平滑過渡動畫
                let baseClass = "rounded-full aspect-square flex flex-col items-center justify-center transition-all duration-300 p-1 text-center shadow-sm border bg-white w-[56px] h-[56px] md:w-[66px] md:h-[66px] ";
                
                // 主桌金色特殊處理
                if (t.table_name.includes("主桌") || t.table_id == "主桌") {
                    baseClass += "border-amber-400 ring-4 ring-amber-100 ring-offset-2 z-20 scale-110";
                    tableDiv.innerHTML = '<span class="font-bold text-amber-800 text-xs md:text-sm">主桌</span>';
                } else {
                    // 一般客桌處理
                    baseClass += "border-stone-200 hover:border-stone-400";
                    tableDiv.innerHTML = '<span class="text-[9px] font-bold ' + colorClass + ' border px-1 rounded-full mb-0.5">' + t.table_id + ' 桌</span>' +
                                         '<span class="font-bold text-stone-700 text-[11px] truncate max-w-full px-0.5">' + t.table_name + '</span>';
                }

                tableDiv.className = baseClass;
                // 強制套用矩陣對照表中的 2D CSS 位置，沒配對到則不顯示
                tableDiv.style = finalGrid[t.table_id] || finalGrid[t.table_name] || "display:none;";

                floorPlanContainer.appendChild(tableDiv);
            });
        }

        // 計算並渲染進度條儀表板
        function renderDashboard() {
            const total = guests.length;
            const checked = guests.filter(g => g.status === "已報到").length;
            const unchecked = total - checked;
            const percentage = total > 0 ? Math.round((checked / total) * 100) : 0;

            document.getElementById("total-count").innerText = total;
            document.getElementById("checked-count").innerText = checked;
            document.getElementById("unchecked-count").innerText = unchecked;
            document.getElementById("progress-bar").style.width = percentage + "%";
            document.getElementById("progress-text").innerText = "目前報到率：" + percentage + "%";
        }

        // 渲染左側賓客名單
        function renderList(data) {
            const listContainer = document.getElementById("guest-list");
            listContainer.innerHTML = "";

            if (data.length === 0) {
                listContainer.innerHTML = '<p class="text-center text-stone-400 py-8">找不到相符的賓客姓名</p>';
                return;
            }

            data.forEach(guest => {
                const item = document.createElement("div");
                item.className = "flex items-center justify-between py-4 transition-colors duration-200";
                const isChecked = guest.status === "已報到";
                
                // 動態從 tables 資料中尋找該桌號數字對應的中文名稱
                const tObj = tables.find(t => t.table_id == guest.table);
                const tableNameText = tObj ? tObj.table_name : "第 " + guest.table + " 桌";

                // 動態產生按鈕或已報到標籤
                let buttonHTML = isChecked 
                    ? '<span class="text-sm text-emerald-600 font-medium bg-emerald-50 px-3 py-1.5 rounded-lg">✓ 已報到</span>'
                    : '<button onclick="checkIn(' + guest.id + ')" class="text-sm bg-rose-500 text-white px-4 py-1.5 rounded-lg hover:bg-rose-600 font-medium shadow-sm transition">確認報到</button>';

                item.innerHTML = '<div>' +
                                 '<span class="text-lg font-medium text-stone-800">' + guest.name + '</span>' +
                                 '<span class="ml-3 text-xs bg-stone-100 text-stone-600 px-2 py-1 rounded-full">' + guest.table + '桌 (' + tableNameText + ')</span>' +
                                 '</div><div>' + buttonHTML + '</div>';
                listContainer.appendChild(item);
            });
        }

        // 點擊「確認報到」按鈕觸發事件 (發送 POST 請求)
        async function checkIn(id) {
            const guest = guests.find(g => g.id === id);
            if (!guest) return;

            // 前端先跑視覺更新，營造流暢感
            guest.status = "已報到";
            renderDashboard();
            renderList(guests);

            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    body: JSON.stringify({ id: id })
                });
                const result = await response.json();
                
                if (result.success) {
                    document.getElementById("search-input").value = ""; // 清空搜尋欄
                    
                    const tObj = tables.find(t => t.table_id == guest.table);
                    const tableNameText = tObj ? tObj.table_name : guest.table + "桌";

                    // 填充歡迎 Modal 視窗內容
                    document.getElementById("modal-name").innerText = guest.name;
                    document.getElementById("modal-table").innerText = guest.table + "桌 (" + tableNameText + ")";
                    
                    // 彈出視窗顯示
                    const modal = document.getElementById("success-modal");
                    modal.classList.remove("hidden");
                    modal.classList.add("flex");

                    // 觸發右側地圖桌子圓圈高亮
                    highlightTable(guest.table);
                } else {
                    alert("後台更新失敗：" + result.message);
                    await fetchGuests();
                }
            } catch (error) {
                console.error("報到請求失敗:", error);
                alert("網路連線異常，簽到資料可能未同步，請重試！");
                await fetchGuests();
            }
        }

        // 控制右側座位圖高亮
        function highlightTable(tableId) {
            // 清除前一次的高亮圓圈
            document.querySelectorAll("#floor-plan > div").forEach(el => el.classList.remove("table-active"));
            // 尋找目標圓圈（例如 id="table-17"）
            const targetTable = document.getElementById("table-" + tableId);
            if (targetTable) {
                targetTable.classList.add("table-active");
            }
        }

        // 關閉 Modal
        function closeModal() {
            const modal = document.getElementById("success-modal");
            modal.classList.add("hidden");
            modal.classList.remove("flex");
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>婚禮賓客現場報到與座位查詢系統</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/html5-qrcode" type="text/javascript"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@300;400;500;700&display=swap');
        html { overflow-y: scroll; scrollbar-gutter: stable; }
        body { font-family: 'Noto Sans TC', sans-serif; background-color: #f7f5f0; }
        .table-active { background-color: #fca5a5 !important; border-color: #ef4444 !important; transform: scale(1.15) !important; z-index: 50; box-shadow: 0 10px 15px -3px rgba(239, 68, 68, 0.4); }
        #reader video { object-fit: cover !important; border-radius: 12px; }
    </style>
</head>
<body class="p-2 md:p-4">

    <div class="w-full mx-auto px-1 md:px-4">
        <header class="text-center mb-5">
            <h1 class="text-3xl font-bold text-stone-800 mb-1">✨ Our Wedding Guest Check-In ✨</h1>
            <p class="text-stone-500 text-sm">婚禮現場賓客報到與座位查詢系統 (終極家族分桌優化版)</p>
        </header>

        <div class="bg-white rounded-2xl p-4 shadow-sm border border-stone-200 mb-5">
            <div class="grid grid-cols-3 gap-4 text-center mb-3">
                <div class="bg-stone-50 p-2.5 rounded-xl">
                    <p class="text-xs text-stone-500">應到人數</p>
                    <p id="total-count" class="text-2xl font-bold text-stone-700">0</p>
                </div>
                <div class="bg-emerald-50 p-2.5 rounded-xl">
                    <p class="text-xs text-emerald-600">已到人數</p>
                    <p id="checked-count" class="text-2xl font-bold text-emerald-600">0</p>
                </div>
                <div class="bg-amber-50 p-2.5 rounded-xl">
                    <p class="text-xs text-amber-600">未到人數</p>
                    <p id="unchecked-count" class="text-2xl font-bold text-amber-600">0</p>
                </div>
            </div>
            <div class="w-full bg-stone-100 rounded-full h-3.5 overflow-hidden">
                <div id="progress-bar" class="bg-gradient-to-r from-emerald-400 to-teal-500 h-3.5 rounded-full transition-all duration-500" style="width: 0%"></div>
            </div>
            <p id="progress-text" class="text-right text-[11px] text-stone-500 mt-1">目前報到率：0%</p>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-12 gap-5 w-full items-stretch">
            <div class="lg:col-span-5 bg-white rounded-2xl p-5 shadow-sm border border-stone-200 flex flex-col">
                <h2 class="text-lg font-semibold text-stone-700 mb-3">🔍 賓客搜尋簽到</h2>
                
                <div class="mb-4 flex items-center gap-2 w-full">
                    <input type="text" id="search-input" placeholder="請輸入賓客姓名（如：王小明）..." 
                           class="w-full min-w-0 flex-1 px-4 py-2.5 rounded-xl border border-stone-300 focus:outline-none focus:ring-2 focus:ring-rose-300 text-lg">
                    <button onclick="startScanner()" class="bg-rose-500 hover:bg-rose-600 text-white px-4 h-[46px] rounded-xl flex items-center justify-center shadow-sm transition shrink-0 text-xl" title="開啟相機掃描">📷</button>
                </div>
                
                <div class="overflow-y-scroll h-[420px] pr-1 divide-y divide-stone-100" id="guest-list">
                    <p class="text-center text-stone-400 py-8">正在連線至雲端試算表載入名單...</p>
                </div>
            </div>

            <div class="lg:col-span-7 bg-white rounded-2xl p-5 shadow-sm border border-stone-200 flex flex-col">
                <h2 class="text-lg font-semibold text-stone-700 mb-4">📍 宴會廳座位圖</h2>
                <div class="w-full bg-stone-100 border border-stone-200 rounded-2xl shadow-inner p-4 flex gap-4 flex-1 items-stretch justify-center min-h-[500px]">
                    <div class="w-12 bg-rose-100 border border-rose-200 text-rose-700 flex items-center justify-center rounded-xl font-bold text-sm text-center px-2 shadow-sm self-stretch" style="writing-mode: vertical-lr;">舞 台 (Stage)</div>
                    <div class="flex-1 bg-white border border-stone-200 rounded-xl shadow-sm p-2 flex items-center justify-center overflow-hidden self-stretch w-full">
                        <div id="floor-plan" class="w-full aspect-[16/10] max-h-[420px] relative"></div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div id="success-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-8 max-w-sm w-full text-center shadow-xl transform scale-95 transition-transform duration-300">
            <div class="text-5xl mb-4">🎉</div>
            <h3 class="text-2xl font-bold text-stone-800 mb-2">歡迎光臨！</h3>
            <p id="modal-name" class="text-xl font-medium text-rose-600 mb-1">---</p>
            <div id="modal-table-container" class="text-stone-500 mb-6">
                您的座位在：<span id="modal-table" class="font-bold text-stone-800 bg-amber-100 px-2 py-1 rounded">---</span>
            </div>
            <button onclick="closeModal()" class="w-full bg-stone-800 text-white py-3 rounded-xl font-medium hover:bg-stone-700 transition">確認</button>
        </div>
    </div>

    <div id="scanner-modal" class="fixed inset-0 bg-black bg-opacity-70 hidden items-center justify-center p-4 z-50 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-5 max-w-md w-full text-center shadow-xl flex flex-col">
            <div class="flex justify-between items-center mb-3">
                <h3 class="text-lg font-bold text-stone-800">📷 掃描賓客 QR Code</h3>
                <button onclick="closeScanner()" class="text-stone-400 hover:text-stone-600 font-bold text-xl px-2">✕</button>
            </div>
            <div id="reader" class="w-full bg-stone-900 rounded-xl overflow-hidden shadow-inner" style="max-height: 350px;"></div>
            <p class="text-xs text-stone-400 mt-3">請將賓客的 QR Code 對準鏡頭中央即可自動報到</p>
        </div>
    </div>

    <div id="group-modal" class="fixed inset-0 bg-black bg-opacity-50 hidden items-center justify-center p-4 z-50 transition-opacity duration-300">
        <div class="bg-white rounded-2xl p-6 max-w-md w-full shadow-xl transform scale-95 transition-transform duration-300 flex flex-col">
            <h3 class="text-xl font-bold text-stone-800 mb-1">👥 家族/群組聯合報到</h3>
            <p class="text-sm text-stone-500 mb-4">請勾選本次現場「實際到場」的成員：</p>
            
            <div id="group-member-list" class="space-y-2.5 max-h-[260px] overflow-y-auto mb-5 pr-1">
                </div>
            
            <div class="flex gap-3">
                <button onclick="closeGroupModal()" class="flex-1 bg-stone-100 text-stone-600 py-3 rounded-xl font-medium hover:bg-stone-200 transition">取消</button>
                <button onclick="submitGroupCheckIn()" class="flex-1 bg-rose-500 hover:bg-rose-600 text-white py-3 rounded-xl font-medium shadow-sm transition">確認報到</button>
            </div>
        </div>
    </div>

    <script>
        // 💡 核心配置：換上你最新部署的 GAS 網頁應用程式網址！
        const API_URL = "https://script.google.com/macros/s/AKfycbzjNib56lrJMKki__XWhkOjiDOJn3a1sDkH8TveFQ8D4KSkjWJ394WnwwhDwsS2gkHd/exec"; 

        let guests = [];
        let tables = [];
        let html5QrCode = null;
        let currentGroupMembers = [];

        initSystem();

        async function initSystem() {
            await fetchGuests();
            document.getElementById("search-input").addEventListener("input", (e) => {
                const keyword = e.target.value.trim();
                const filtered = guests.filter(g => g.name.includes(keyword));
                renderList(filtered);
            });
        }

        async function fetchGuests() {
            try {
                const cacheBuster = "?_=" + new Date().getTime();
                const response = await fetch(API_URL + cacheBuster);
                const resData = await response.json();
                
                if (!resData.success) {
                    document.getElementById("guest-list").innerHTML = '<p class="text-center text-red-500 py-8">後台資料庫讀取失敗</p>';
                    return;
                }
                
                guests = resData.guests;
                tables = resData.tables;
                renderDashboard();
                renderList(guests);
                renderFloorPlan(); 
            } catch (error) {
                console.error(error);
                document.getElementById("guest-list").innerHTML = '<p class="text-center text-red-500 py-8">連線失敗，請確認後台 API 部署狀態。</p>';
            }
        }

        async function startScanner() {
            document.getElementById("scanner-modal").classList.remove("hidden");
            document.getElementById("scanner-modal").classList.add("flex");
            html5QrCode = new Html5Qrcode("reader");
            const config = { fps: 10, qrbox: { width: 220, height: 220 } };
            try {
                await html5QrCode.start({ facingMode: "environment" }, config, onScanSuccess);
